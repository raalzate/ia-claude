name: quality

# Lint + docstring-coverage gate. Enforces the linter/doc-coverage decision
# recorded in pyproject.toml (ruff + interrogate). Constitution Principle
# VIII (Mandatory Documentation, NON-NEGOTIABLE) requires why-comments on
# every non-trivial function; interrogate is the floor that catches missing
# docstrings before merge. ruff runs lint + format check + import-order in
# one tool.

on:
  pull_request:
    branches: [main]
    paths:
      - "katas/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/quality.yml"
  push:
    branches: [main]
    paths:
      - "katas/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  lint-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Detect kata sources
        id: detect
        run: |
          if find katas -mindepth 2 -name "*.py" -print -quit 2>/dev/null | grep -q .; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No kata code yet — quality gate noop."
          fi

      - name: Ruff lint
        if: steps.detect.outputs.ready == 'true'
        run: ruff check .

      - name: Ruff format check
        if: steps.detect.outputs.ready == 'true'
        run: ruff format --check .

      - name: Docstring coverage (interrogate)
        if: steps.detect.outputs.ready == 'true'
        run: interrogate -c pyproject.toml katas/
