name: architect-review

# Headless deterministic PR review — Kata 13 derivative.
# Constitution sync-impact follow-up: "CI gate running headless architect
# review on each PR". Activates once Kata 13 (`013-headless-ci-review`)
# implementation lands under `katas/kata_013_headless_ci_review/`.
#
# While the kata is unimplemented, the workflow stays disabled
# (workflow_dispatch only) and records a noop run so the gate is visible
# in branch protection without ever failing builds.
#
# To enable as a required PR check:
#   1. Confirm `katas/kata_013_headless_ci_review/runner.py` exists.
#   2. Switch the `on:` block to `pull_request:` (uncomment below).
#   3. Add `architect-review / review` to required status checks.

on:
  workflow_dispatch:
  # Enable after Kata 13 ships:
  # pull_request:
  #   branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Kata 13 implementation
        id: detect
        run: |
          if [[ -f "katas/kata_013_headless_ci_review/runner.py" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Kata 13 not implemented yet; architect-review noop."
          fi

      - name: Set up Python
        if: steps.detect.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kata 13 deps
        if: steps.detect.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade pip
          if [[ -f pyproject.toml ]]; then
            pip install -e ".[dev]"
          fi

      - name: Run headless architect review
        if: steps.detect.outputs.ready == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # Schema-validated CLI per Kata 13 contract.
          # Output is structured JSON; no string parsing in this gate.
          python -m katas.kata_013_headless_ci_review.runner \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --json-schema specs/013-headless-ci-review/contracts/cli-output-envelope.schema.json \
            --output review.json

      - name: Upload review artifact
        if: always() && steps.detect.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: architect-review
          path: review.json
          if-no-files-found: ignore
          retention-days: 30
