 edge-case corpus and a zero-shot prompt, **When** the practitioner executes the run, **Then** the system records a baseline failure/inconsistency rate for the corpus.\n2. **Given** the same corpus and a prompt augmented with 2–4 structured input/output examples, **When** the practitioner executes the run, **Then** the system records a post-calibration rate and the delta against the baseline.\n3. **Given** a completed calibrated run, **When** the practitioner inspects the logs, **Then** the active example set is identifiable per run.","clarificationCount":0},{"id":"US2","title":"Demonstrate the Anti-Pattern and Measure the Delta","priority":"P2","scenarioCount":2,"body":"A practitioner deliberately demonstrates the documented anti-pattern — relying on zero-shot prompting for a highly subjective or format-sensitive task and then attempting to fix inconsistency turn after turn via prompt tweaks — on the same inputs used for the few-shot run. The measured delta between the anti-pattern approach and the calibrated few-shot approach is recorded as evidence.\n\n**Why this priority**: The kata's educational payload depends on making the anti-pattern concrete and measurable. Without this story, practitioners may treat few-shot calibration as optional polish rather than the correct default for subjective/format-sensitive tasks.\n\n**Independent Test**: Can be fully tested by executing both approaches against the same identical input set and verifying that a single artifact records both rates and the computed delta.\n\n**Acceptance Scenarios**:\n\n1. **Given** an identical input set used for both approaches, **When** zero-shot and few-shot runs complete, **Then** both results are recorded side by side with the computed delta.\n2. **Given** a zero-shot run attempting to fix format issues via successive prompt tweaks, **When** the practitioner inspects the outcome, **Then** the inconsistency pattern is documented as the defended anti-pattern.","clarificationCount":0},{"id":"US3","title":"Rotate the Example Set and Observe Sensitivity","priority":"P3","scenarioCount":2,"body":"A practitioner swaps the active example set for an alternative set of the same size (still 2–4 pairs) covering different edge cases or of different quality. They re-run the corpus and observe how output quality changes, producing a sensitivity record that shows example quality — not merely example count — is the driver.\n\n**Why this priority**: This story deepens understanding but is not required to demonstrate the core calibration benefit. It becomes valuable after P1 and P2 are in place.\n\n**Independent Test**: Can be fully tested by running the corpus with at least two distinct example sets, confirming each run logs which set was active, and comparing the resulting rates.\n\n**Acceptance Scenarios**:\n\n1. **Given** two or more distinct example sets of size 2–4, **When** the practitioner runs the corpus with each, **Then** each run records the active example set identifier and its measured rate.\n2. **Given** two completed runs with different example sets, **When** the practitioner compares the results, **Then** the sensitivity to example quality is documented.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST include 2–4 input/output example pairs in the prompt when measured zero-shot performance on the edge-case corpus is below the declared threshold."},{"id":"FR-002","text":"System MUST validate that the active example set covers representative edge cases for the task before that set is used in a calibrated run."},{"id":"FR-003","text":"System MUST log which example set was active for each run, such that any recorded result can be traced to its calibration inputs."},{"id":"FR-004","text":"System MUST measure and record the zero-shot vs. few-shot delta on the same corpus, producing a single comparable metric per corpus."},{"id":"FR-005","text":"System MUST treat a contradictory example set as an error condition and refuse to run it silently; contradictions MUST surface as a validation failure rather than degraded output."},{"id":"FR-006","text":"System MUST reject or flag example sets whose size falls outside the 2–4 pair range so that calibration stays within the kata's defined envelope."},{"id":"FR-007","text":"System MUST defend against the documented anti-pattern by requiring explicit acknowledgement when a subjective or format-sensitive task is executed in zero-shot mode."}],"successCriteria":[{"id":"SC-001","text":"Few-shot calibration reduces the inconsistency rate on the edge-case corpus by at least a declared X% compared to the zero-shot baseline on the same inputs."},{"id":"SC-002","text":"100% of calibrated runs produce schema-valid output for the declared edge-case task format."},{"id":"SC-003","text":"0 silently-contradictory example sets are accepted — every contradictory set surfaces as a validation failure before the run executes."},{"id":"SC-004","text":"The active example set is logged and retrievable for 100% of runs (zero-shot and few-shot alike), so any result can be traced back to its calibration inputs."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (shared baseline with katas 001–013)."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — prompt submission + structured response"},{"label":"Storage","value":"Local filesystem only. Each calibration cycle produces one"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance scenarios; plain pytest for"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — kata module under"},{"label":"Performance Goals","value":"Not latency-bound. Fixture-backed acceptance run"},{"label":"Constraints","value":"- `ExampleSet` with `len(pairs) < 2 or len(pairs) > 4` MUST raise at"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/014-few-shot-calibration","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST include 2–4 input/output example pairs in the prompt when measured zero-shot performance on the edge-case corpus is below the declared threshold."},{"id":"FR-002","text":"System MUST validate that the active example set covers representative edge cases for the task before that set is used in a calibrated run."},{"id":"FR-003","text":"System MUST log which example set was active for each run, such that any recorded result can be traced to its calibration inputs."},{"id":"FR-004","text":"System MUST measure and record the zero-shot vs. few-shot delta on the same corpus, producing a single comparable metric per corpus."},{"id":"FR-005","text":"System MUST treat a contradictory example set as an error condition and refuse to run it silently; contradictions MUST surface as a validation failure rather than degraded output."},{"id":"FR-006","text":"System MUST reject or flag example sets whose size falls outside the 2–4 pair range so that calibration stays within the kata's defined envelope."},{"id":"FR-007","text":"System MUST defend against the documented anti-pattern by requiring explicit acknowledgement when a subjective or format-sensitive task is executed in zero-shot mode."},{"id":"SC-001","text":"Few-shot calibration reduces the inconsistency rate on the edge-case corpus by at least a declared X% compared to the zero-shot baseline on the same inputs."},{"id":"SC-002","text":"100% of calibrated runs produce schema-valid output for the declared edge-case task format."},{"id":"SC-003","text":"0 silently-contradictory example sets are accepted — every contradictory set surfaces as a validation failure before the run executes."},{"id":"SC-004","text":"The active example set is logged and retrievable for 100% of runs (zero-shot and few-shot alike), so any result can be traced back to its calibration inputs."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"013-headless-ci-review":{"board":{"todo":[{"id":"US1","title":"Automated inline review on every pull request","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Schema-enforced output, fail-closed on drift","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Swap the review prompt without touching CI glue","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Automated inline review on every pull request","priority":"P1","scenarioCount":2,"body":"A practitioner opens a pull request against the workshop repository. A CI job runs the Claude Code CLI in headless mode, asks it to analyze the changed files, receives a structured response, and automatically posts inline annotations on the PR without any human kicking off the reviewer by hand.\n\n**Why this priority**: This is the minimum viable outcome that satisfies the Development Workflow section of `CONSTITUTION.md` v1.2.0 (automated deterministic reviewer on each PR). Without it, the kata has no demonstrable value — an agentic reviewer that is not wired into CI is just a local script.\n\n**Independent Test**: Open a throwaway pull request with at least one changed file. The CI workflow triggers, the headless reviewer runs, and at least one inline annotation appears on the PR diff within the CI run, with no manual step between \"push\" and \"annotation visible\".\n\n**Acceptance Scenarios**:\n\n1. **Given** a pull request is opened with one or more changed files, **When** the CI workflow runs, **Then** the Claude Code CLI is invoked non-interactively and the job completes without any interactive prompt.\n2. **Given** the reviewer produces a valid structured response, **When** the CI step that maps findings to the repository runs, **Then** each finding appears as an inline annotation attached to the relevant file and line on the pull request.","clarificationCount":0},{"id":"US2","title":"Schema-enforced output, fail-closed on drift","priority":"P2","scenarioCount":2,"body":"A practitioner asserts that the review output always conforms to the declared JSON schema. If the model returns anything that does not validate — missing fields, wrong types, extra free-form prose, truncated JSON — the CI step fails the job instead of silently degrading into regex parsing.\n\n**Why this priority**: This is the direct defense against the kata's documented anti-pattern (\"letting the agent output free-form prose that the CI script then has to parse with regex\") and enforces Principle II (Schema-Enforced Boundaries) of `CONSTITUTION.md`. It is P2 rather than P1 because the pipeline can produce annotations (P1) before it is hardened against drift, but it cannot be considered trustworthy until drift fails closed.\n\n**Independent Test**: Inject a stub reviewer response that violates the schema (e.g., remove a required field). The CI step must fail with a clear schema-violation error, and no annotations must be posted for that run.\n\n**Acceptance Scenarios**:\n\n1. **Given** the reviewer response validates against the declared JSON schema, **When** the CI step validates output, **Then** the step passes and hands the findings to the annotation mapper.\n2. **Given** the reviewer response does not validate against the declared JSON schema, **When** the CI step validates output, **Then** the step fails the job and no annotations are posted.","clarificationCount":0},{"id":"US3","title":"Swap the review prompt without touching CI glue","priority":"P3","scenarioCount":2,"body":"A practitioner changes the review prompt template (e.g., swaps \"analyze for vulnerabilities\" for \"analyze for performance regressions\") and redeploys. The CI glue code — job definition, schema validation, annotation mapping — does not need to change for the new prompt to take effect.\n\n**Why this priority**: This is a durability and maintainability concern, not a correctness concern. The kata is useful even without this separation, but workshops iterate on prompts frequently and binding the prompt to the CI glue would create churn. Deferring to P3 lets P1 and P2 land first.\n\n**Independent Test**: Replace the prompt template file (or prompt input) with a new review objective that conforms to the same output schema. Re-run the CI job on an unchanged PR. The new prompt is used, annotations reflect the new objective, and no CI workflow file or annotation-mapping script was modified in the same change.\n\n**Acceptance Scenarios**:\n\n1. **Given** the prompt template is stored separately from the CI workflow definition, **When** a practitioner edits only the prompt template, **Then** the next CI run uses the new prompt without any change to the workflow or mapping code.\n2. **Given** a new prompt is deployed, **When** the reviewer runs, **Then** its output still validates against the same declared JSON schema.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST invoke the Claude Code CLI non-interactively (using the `--print` / `-p` flag) so that no TTY or human input is required inside the CI job."},{"id":"FR-002","text":"System MUST request structured output using `--output-format json` together with a declared `--json-schema` so the reviewer is contractually bound to return a single valid object."},{"id":"FR-003","text":"System MUST validate every reviewer response against the declared JSON schema before any downstream step consumes it."},{"id":"FR-004","text":"System MUST fail the CI step when the response does not validate against the schema, and MUST NOT fall back to regex or free-form text parsing."},{"id":"FR-005","text":"System MUST map each validated finding to an inline annotation on the pull request, attached to the file and line indicated in the structured finding."},{"id":"FR-006","text":"System MUST log the full raw reviewer response (stdout and stderr) as a retained CI artifact for audit, regardless of whether the run succeeded or failed."},{"id":"FR-007","text":"System MUST keep the review prompt template decoupled from the CI workflow definition, so the prompt can be changed without editing the workflow or the annotation-mapping code."},{"id":"FR-008","text":"System MUST handle a zero-changed-files PR by producing a schema-valid empty findings set and posting no annotations, rather than failing or emitting free-form prose."},{"id":"FR-009","text":"System MUST fail closed (non-zero CI status, no annotations posted) whenever the CLI exits non-zero or the input exceeds the usable context window."}],"successCriteria":[{"id":"SC-001","text":"100% of CI runs either produce schema-valid reviewer output or fail closed; zero runs post annotations derived from unvalidated output."},{"id":"SC-002","text":"0 instances of free-form regex parsing exist in the CI glue code, verified by review of the mapping script against the declared schema as the sole input contract."},{"id":"SC-003","text":"Findings land as inline annotations on the pull request in at least the workshop's target percentage of runs that produced a non-empty schema-valid findings set (target set by the practitioner at kata execution time)."},{"id":"SC-004","text":"The raw reviewer response is retained as a CI artifact for 100% of runs, including runs that failed schema validation or exited non-zero."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ for the review-mapper script and the"},{"label":"Primary Dependencies","value":"- `claude` CLI (Claude Code) installed on the CI runner — sole source of the"},{"label":"Storage","value":"CI runner filesystem only."},{"label":"Testing","value":"- `pytest` + `pytest-bdd` for acceptance scenarios against fixture CLI outputs."},{"label":"Target Platform","value":"GitHub Actions (ubuntu-latest) for CI; developer"},{"label":"Project Type","value":"Single project — one kata package under"},{"label":"Performance Goals","value":"Not latency-bound. The CI job's non-CLI overhead"},{"label":"Constraints","value":"- Zero `re.findall` / `re.search` / `str.split` / substring slicing over the"},{"label":"Scale/Scope","value":"One kata, ~200–400 LOC of Python (mapper + validator +"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/013-headless-ci-review","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST invoke the Claude Code CLI non-interactively (using the `--print` / `-p` flag) so that no TTY or human input is required inside the CI job."},{"id":"FR-002","text":"System MUST request structured output using `--output-format json` together with a declared `--json-schema` so the reviewer is contractually bound to return a single valid object."},{"id":"FR-003","text":"System MUST validate every reviewer response against the declared JSON schema before any downstream step consumes it."},{"id":"FR-004","text":"System MUST fail the CI step when the response does not validate against the schema, and MUST NOT fall back to regex or free-form text parsing."},{"id":"FR-005","text":"System MUST map each validated finding to an inline annotation on the pull request, attached to the file and line indicated in the structured finding."},{"id":"FR-006","text":"System MUST log the full raw reviewer response (stdout and stderr) as a retained CI artifact for audit, regardless of whether the run succeeded or failed."},{"id":"FR-007","text":"System MUST keep the review prompt template decoupled from the CI workflow definition, so the prompt can be changed without editing the workflow or the annotation-mapping code."},{"id":"FR-008","text":"System MUST handle a zero-changed-files PR by producing a schema-valid empty findings set and posting no annotations, rather than failing or emitting free-form prose."},{"id":"FR-009","text":"System MUST fail closed (non-zero CI status, no annotations posted) whenever the CLI exits non-zero or the input exceeds the usable context window."},{"id":"SC-001","text":"100% of CI runs either produce schema-valid reviewer output or fail closed; zero runs post annotations derived from unvalidated output."},{"id":"SC-002","text":"0 instances of free-form regex parsing exist in the CI glue code, verified by review of the mapping script against the declared schema as the sole input contract."},{"id":"SC-003","text":"Findings land as inline annotations on the pull request in at least the workshop's target percentage of runs that produced a non-empty schema-valid findings set (target set by the practitioner at kata execution time)."},{"id":"SC-004","text":"The raw reviewer response is retained as a CI artifact for 100% of runs, including runs that failed schema validation or exited non-zero."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"012-prompt-chaining":{"board":{"todo":[{"id":"US1","title":"Chained Audit of a Multi-File Pull Request","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Baseline Comparison Against the Monolithic Anti-Pattern","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Extending the Chain With an Additional Stage","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Chained Audit of a Multi-File Pull Request","priority":"P1","scenarioCount":3,"body":"A practitioner feeds a multi-file pull request (e.g. 15 files) into the workflow. The chain first produces one focused per-file report per input, then an integration-only report that evaluates inter-module coherence across the accumulated reports. The two output classes are kept distinct and traceable back to the stage that produced them.\n\n**Why this priority**: This is the core value of the kata — it is the MVP that proves decomposition avoids cognitive saturation and produces deeper findings than a single monolithic prompt. Without this story, no other user story makes sense.\n\n**Independent Test**: Can be fully tested by submitting a corpus of N files, observing that the artifact set contains exactly N per-file reports plus one integration report, and that the integration report references inter-module relationships rather than restating per-file issues.\n\n**Acceptance Scenarios**:\n\n1. **Given** a macro task consisting of 15 files to audit, **When** the practitioner runs the chain, **Then** the workflow emits 15 per-file reports and 1 integration report as distinct artifacts.\n2. **Given** the per-file pass has completed, **When** the integration pass runs, **Then** its prompt contains the accumulated per-file reports and explicit instruction to evaluate ONLY inter-module incoherences.\n3. **Given** the final integration report, **When** it is inspected, **Then** it contains no re-analysis of single-file local issues already covered in per-file reports.","clarificationCount":0},{"id":"US2","title":"Baseline Comparison Against the Monolithic Anti-Pattern","priority":"P2","scenarioCount":2,"body":"A practitioner runs a baseline where all files are crammed into one monolithic prompt asking for both local and integration analysis at the same time. They then compare the baseline against the chained run on the same corpus and observe missed findings, shallow findings, or dilution in the baseline output.\n\n**Why this priority**: This story empirically justifies the kata's existence by demonstrating the anti-pattern's cost. It is secondary because P1 already delivers value independently; this story adds the evidence that the chain is superior.\n\n**Independent Test**: Can be tested by running both modes on an identical corpus and producing a side-by-side delta report showing finding counts, depth, and categorization per mode.\n\n**Acceptance Scenarios**:\n\n1. **Given** the same corpus used in US1, **When** the practitioner runs the baseline monolithic prompt, **Then** the output is captured as a single artifact for comparison.\n2. **Given** both the chained and baseline outputs, **When** the practitioner performs a delta comparison, **Then** the chain exhibits at least the declared coverage delta of findings over the baseline.","clarificationCount":0},{"id":"US3","title":"Extending the Chain With an Additional Stage","priority":"P3","scenarioCount":2,"body":"A practitioner adds a new stage (e.g. a security-focused scan pass) to the chain without modifying any earlier stage's prompt, payload contract, or output. The new stage consumes existing intermediate payloads and emits its own report.\n\n**Why this priority**: Demonstrates that the chain is composable and forward-extensible. This is valuable long-term but not required for the MVP chain to function.\n\n**Independent Test**: Can be tested by adding one new stage definition, rerunning the chain, and verifying that no prior stage's file, prompt, or artifact was modified.\n\n**Acceptance Scenarios**:\n\n1. **Given** an existing chain with per-file and integration stages, **When** the practitioner declares a new security stage downstream, **Then** the chain executes the new stage using existing intermediate payloads.\n2. **Given** the extension is complete, **When** the diff of earlier stage definitions is inspected, **Then** zero changes are observed in those earlier stage files.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST decompose any macro audit task into a set of explicitly declared stages, each with a named responsibility."},{"id":"FR-002","text":"The system MUST persist intermediate payloads between stages so that downstream stages consume the accumulated outputs of upstream stages rather than re-reading the raw corpus."},{"id":"FR-003","text":"The system MUST restrict each stage's prompt to its declared responsibility (e.g. per-file pass analyzes local issues only; integration pass evaluates inter-module incoherences only)."},{"id":"FR-004","text":"The system MUST fail loud (surface an explicit error and halt the chain) if an intermediate payload is malformed, missing required fields, or truncated."},{"id":"FR-005","text":"The system MUST allow the chain to be extended by adding new stages downstream without requiring modification of existing stage definitions, prompts, or payload contracts."},{"id":"FR-006","text":"The system MUST emit per-file reports and the integration report as distinct, separately addressable artifacts."},{"id":"FR-007","text":"The system MUST record which stage produced each artifact so findings are traceable to their originating pass."},{"id":"FR-008","text":"The system MUST surface per-file analysis failures rather than silently skipping or absorbing them into a partial integration report."}],"successCriteria":[{"id":"SC-001","text":"Finding coverage produced by the chained run is greater than or equal to the baseline (monolithic prompt) run by at least the declared delta on the same corpus."},{"id":"SC-002","text":"Each stage's prompt stays under its declared size budget (tokens or characters) across all runs in the evaluation set."},{"id":"SC-003","text":"Zero silent swallowing of failed stages — 100% of per-file analysis failures surface as explicit errors in the chain's output."},{"id":"SC-004","text":"Adding a new stage to the chain requires zero changes to existing stage definitions, prompts, or payload contracts (verified by diff)."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (shared baseline across all katas)."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — each stage issues one `messages.create`"},{"label":"Storage","value":"Local filesystem only."},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit + schema"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — one kata module at"},{"label":"Performance Goals","value":"Not latency-bound. Acceptance scenarios against recorded"},{"label":"Constraints","value":"- Each stage MUST validate its output against its declared `output_schema`"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/012-prompt-chaining","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The system MUST decompose any macro audit task into a set of explicitly declared stages, each with a named responsibility."},{"id":"FR-002","text":"The system MUST persist intermediate payloads between stages so that downstream stages consume the accumulated outputs of upstream stages rather than re-reading the raw corpus."},{"id":"FR-003","text":"The system MUST restrict each stage's prompt to its declared responsibility (e.g. per-file pass analyzes local issues only; integration pass evaluates inter-module incoherences only)."},{"id":"FR-004","text":"The system MUST fail loud (surface an explicit error and halt the chain) if an intermediate payload is malformed, missing required fields, or truncated."},{"id":"FR-005","text":"The system MUST allow the chain to be extended by adding new stages downstream without requiring modification of existing stage definitions, prompts, or payload contracts."},{"id":"FR-006","text":"The system MUST emit per-file reports and the integration report as distinct, separately addressable artifacts."},{"id":"FR-007","text":"The system MUST record which stage produced each artifact so findings are traceable to their originating pass."},{"id":"FR-008","text":"The system MUST surface per-file analysis failures rather than silently skipping or absorbing them into a partial integration report."},{"id":"SC-001","text":"Finding coverage produced by the chained run is greater than or equal to the baseline (monolithic prompt) run by at least the declared delta on the same corpus."},{"id":"SC-002","text":"Each stage's prompt stays under its declared size budget (tokens or characters) across all runs in the evaluation set."},{"id":"SC-003","text":"Zero silent swallowing of failed stages — 100% of per-file analysis failures surface as explicit errors in the chain's output."},{"id":"SC-004","text":"Adding a new stage to the chain requires zero changes to existing stage definitions, prompts, or payload contracts (verified by diff)."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"011-softmax-mitigation":{"board":{"todo":[{"id":"US1","title":"Edge Placement of Critical Rule","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Anti-Pattern Demonstration: Rule Buried in the Middle","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Proactive Compaction and Re-Anchoring","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Edge Placement of Critical Rule","priority":"P1","scenarioCount":2,"body":"A practitioner authors a long prompt that contains a single hard, non-negotiable business rule (an absolute guardrail). Following the edge-placement pattern, the practitioner deliberately anchors that rule at both the primacy edge (very top of the prompt) and the latency edge (very bottom, just before the user turn). The practitioner then runs a representative set of requests that try, both directly and indirectly, to elicit a response that would violate the rule, and verifies the model obeys the rule consistently across the run.\n\n**Why this priority**: This is the baseline defense against the softmax-dilution failure mode. If critical rules are not anchored at the edges, every downstream mitigation (compaction, re-anchoring, logging) is operating on an already-compromised prompt. P1 delivers the minimum viable protection on its own.\n\n**Independent Test**: Can be fully tested by (a) declaring one critical rule, (b) rendering a long prompt with the rule placed only at the extremes, (c) issuing a batch of adversarial/ambiguous requests, and (d) measuring the rule-compliance rate against the declared target. No compaction logic is required for this story to deliver value.\n\n**Acceptance Scenarios**:\n\n1. **Given** a declared critical rule and a long prompt rendered with edge placement enabled, **When** the practitioner submits the adversarial request batch, **Then** the observed rule-compliance rate meets or exceeds the declared target X%.\n2. **Given** a long prompt whose body contains content that implicitly contradicts the critical rule, **When** the rule is anchored at both edges, **Then** the model defers to the edge-anchored rule rather than the contradictory mid-prompt content.","clarificationCount":0},{"id":"US2","title":"Anti-Pattern Demonstration: Rule Buried in the Middle","priority":"P2","scenarioCount":2,"body":"The practitioner runs a controlled variant of the P1 scenario in which the same critical rule is deliberately placed in the middle of the prompt, with no edge anchoring. The practitioner executes the same adversarial batch and records the violation rate. The system surfaces the delta between mid-placement and edge-placement so the softmax-dilution effect is visible and the defense (edge placement) is justified empirically.\n\n**Why this priority**: The defense only becomes convincing when the attack is demonstrated. P2 proves the \"lost in the middle\" phenomenon on the practitioner's own workload and produces the empirical gap that motivates P1. It is secondary because P1 alone already delivers protection; P2 delivers the explanation and the regression signal.\n\n**Independent Test**: Can be fully tested by rendering the prompt with the rule in the middle, running the same adversarial batch used in P1, and computing the compliance delta against the P1 run. Passes when the drop is at least the declared threshold.\n\n**Acceptance Scenarios**:\n\n1. **Given** the same critical rule, adversarial batch, and base prompt from P1, **When** the rule is placed in the middle third of the prompt instead of the edges, **Then** the observed compliance rate drops by at least the declared threshold Δ.\n2. **Given** the mid-placement run completes, **When** the practitioner reviews the output, **Then** a clearly labelled anti-pattern report is produced that names the violations and attributes them to mid-context burying.","clarificationCount":0},{"id":"US3","title":"Proactive Compaction and Re-Anchoring","priority":"P3","scenarioCount":3,"body":"During a long multi-turn session, context usage grows past roughly 55% of the model's working window. Before attention rot sets in, the system proactively compacts older turns into a summary while preserving the critical rules verbatim, and re-renders the compacted prompt with those rules re-anchored at both edges. The practitioner verifies that, after compaction, the rules are still obeyed with the same compliance level observed in P1.\n\n**Why this priority**: Compaction is only meaningful after the edge-placement and anti-pattern-detection foundations are in place. P3 extends protection from single-shot prompts to long-running sessions. It is last because it presupposes the rules, thresholds, and measurement harness produced by P1 and P2.\n\n**Independent Test**: Can be fully tested by scripting a session that drives usage past the declared compaction threshold, asserting that a compaction event fires before 60%, inspecting the post-compaction prompt for the verbatim critical rules at both edges, and re-running a sample of the P1 adversarial batch against the compacted session.\n\n**Acceptance Scenarios**:\n\n1. **Given** an active session whose token usage crosses the 50–60% compaction band, **When** the next turn is prepared, **Then** a compaction event fires before usage exceeds 60%.\n2. **Given** a compaction event has just completed, **When** the post-compaction prompt is rendered, **Then** every declared critical rule is present verbatim at both the primacy and latency edges.\n3. **Given** a re-anchored post-compaction prompt, **When** the P1 adversarial batch is replayed, **Then** the compliance rate is not materially lower than the pre-compaction P1 rate.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST place every declared critical rule at both the primacy edge (top) and the latency edge (bottom) of every rendered prompt."},{"id":"FR-002","text":"System MUST run automatic compaction when session context usage crosses a declared capacity threshold within the 50–60% band, and MUST complete compaction before usage exceeds 60%."},{"id":"FR-003","text":"System MUST re-anchor every declared critical rule verbatim at both edges of the post-compaction prompt."},{"id":"FR-004","text":"System MUST log every edge-placement decision and every compaction event with enough detail (rule identity, placement position, capacity at trigger, rules preserved) to audit compliance after the fact."},{"id":"FR-005","text":"System MUST reject, or fail closed on, any content or configuration that would push a declared critical rule out of an edge region or cause it to be buried in the middle of the prompt."},{"id":"FR-006","text":"System MUST expose a mid-placement anti-pattern mode for demonstration purposes that is clearly labelled as such and cannot be enabled in production runs without an explicit opt-in flag."},{"id":"FR-007","text":"System MUST record, per run, the rule-compliance rate and the delta between edge-placement and mid-placement runs so the softmax-dilution effect is measurable."}],"successCriteria":[{"id":"SC-001","text":"Rule compliance under edge placement meets or exceeds the declared target X% across the adversarial batch."},{"id":"SC-002","text":"Compliance drop between edge placement and mid-placement is clearly observable, with Δ greater than or equal to the declared threshold, demonstrating the softmax-dilution effect on the practitioner's own workload."},{"id":"SC-003","text":"Every compaction event fires before session capacity exceeds 60%, with zero recorded instances of a session reaching the hard limit without a compaction attempt."},{"id":"SC-004","text":"Every post-compaction prompt contains every declared critical rule verbatim at both the primacy and latency edges, verified by automated inspection on 100% of compaction events."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — sole transport for the compliance"},{"label":"Storage","value":"Local filesystem only. Per-run artifacts under"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit. Default"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions CI"},{"label":"Project Type","value":"Single project — one kata module under"},{"label":"Performance Goals","value":"Not latency-bound. Offline acceptance runs complete"},{"label":"Constraints","value":"- `PromptLayout` rendering MUST place every declared `CriticalRule` at both"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/011-softmax-mitigation","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST place every declared critical rule at both the primacy edge (top) and the latency edge (bottom) of every rendered prompt."},{"id":"FR-002","text":"System MUST run automatic compaction when session context usage crosses a declared capacity threshold within the 50–60% band, and MUST complete compaction before usage exceeds 60%."},{"id":"FR-003","text":"System MUST re-anchor every declared critical rule verbatim at both edges of the post-compaction prompt."},{"id":"FR-004","text":"System MUST log every edge-placement decision and every compaction event with enough detail (rule identity, placement position, capacity at trigger, rules preserved) to audit compliance after the fact."},{"id":"FR-005","text":"System MUST reject, or fail closed on, any content or configuration that would push a declared critical rule out of an edge region or cause it to be buried in the middle of the prompt."},{"id":"FR-006","text":"System MUST expose a mid-placement anti-pattern mode for demonstration purposes that is clearly labelled as such and cannot be enabled in production runs without an explicit opt-in flag."},{"id":"FR-007","text":"System MUST record, per run, the rule-compliance rate and the delta between edge-placement and mid-placement runs so the softmax-dilution effect is measurable."},{"id":"SC-001","text":"Rule compliance under edge placement meets or exceeds the declared target X% across the adversarial batch."},{"id":"SC-002","text":"Compliance drop between edge placement and mid-placement is clearly observable, with Δ greater than or equal to the declared threshold, demonstrating the softmax-dilution effect on the practitioner's own workload."},{"id":"SC-003","text":"Every compaction event fires before session capacity exceeds 60%, with zero recorded instances of a session reaching the hard limit without a compaction attempt."},{"id":"SC-004","text":"Every post-compaction prompt contains every declared critical rule verbatim at both the primacy and latency edges, verified by automated inspection on 100% of compaction events."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"009-path-rules":{"board":{"todo":[{"id":"US1","title":"Testing rules auto-inject on test edits","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"No rule tokens spent on unrelated edits","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"New rule file activates only on matching edits","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Testing rules auto-inject on test edits","priority":"P1","scenarioCount":2,"body":"A practitioner opens the workshop repository and edits a file matching the testing pattern (e.g. `**/*.test.tsx`). The agent automatically loads only the rules declared in `.claude/rules/testing.md` — which cover conventions like `describe/it` block structure and data-factory usage — so the practitioner receives targeted guidance without paying token cost for unrelated rule files.\n\n**Why this priority**: This is the headline behavior of the kata. Without automatic injection on matching edits, there is no value delivered — the whole feature exists to make the right rules appear at the right moment.\n\n**Independent Test**: Can be fully tested by (a) creating `.claude/rules/testing.md` with a `paths` frontmatter entry for `**/*.test.tsx`, (b) asking the agent to edit a `.test.tsx` file, and (c) confirming the testing rules are present in the active context and that no non-matching rule files were loaded.\n\n**Acceptance Scenarios**:\n\n1. **Given** `.claude/rules/testing.md` declares `paths: [\"**/*.test.tsx\"]` and the file is otherwise valid, **When** the practitioner edits `src/components/Button.test.tsx`, **Then** the testing rules are injected into the active turn and an audit entry records `testing.md` as activated.\n2. **Given** multiple rule files exist but only one matches, **When** the practitioner edits a single matching file, **Then** only the matching rule file is injected and the audit log lists exactly that one activation.","clarificationCount":0},{"id":"US2","title":"No rule tokens spent on unrelated edits","priority":"P2","scenarioCount":2,"body":"A practitioner edits a source file that is not matched by any rule file's path pattern. The agent performs the edit without loading any rule file — defending against the anti-pattern of always-on rule loading that wastes tokens on every turn regardless of relevance.\n\n**Why this priority**: This is the context-economy payoff (Constitution principle III). Without this guarantee, the feature collapses into the very anti-pattern it is meant to prevent.\n\n**Independent Test**: Can be fully tested by editing a file that matches no declared pattern and verifying (via the activation audit log) that zero rule files were injected and that token usage for that turn is equivalent to a baseline turn with no `.claude/rules/` directory present.\n\n**Acceptance Scenarios**:\n\n1. **Given** `.claude/rules/` contains rule files but none declare a pattern matching `README.md`, **When** the practitioner edits `README.md`, **Then** no rule file is injected and the audit log shows zero activations for that turn.\n2. **Given** the practitioner performs a read-only operation that touches no file, **When** the turn completes, **Then** no rule file is injected.","clarificationCount":0},{"id":"US3","title":"New rule file activates only on matching edits","priority":"P3","scenarioCount":2,"body":"A practitioner adds a new rule file (e.g. `.claude/rules/api-conventions.md`) with a new path pattern (e.g. `paths: [\"src/api/**/*.ts\"]`). The file begins activating automatically on edits to matching paths and remains dormant on all other edits — no code change, no agent restart, no CLAUDE.md edit required.\n\n**Why this priority**: This proves the mechanism is extensible and governs itself by frontmatter declarations, not by hard-coded agent logic. It is P3 because P1 and P2 already constitute a usable MVP.\n\n**Independent Test**: Can be fully tested by adding a new rule file with a distinct pattern, editing a matching file and a non-matching file in sequence, and confirming the activation audit log reflects one activation and zero activations respectively.\n\n**Acceptance Scenarios**:\n\n1. **Given** a newly added `.claude/rules/api-conventions.md` with `paths: [\"src/api/**/*.ts\"]`, **When** the practitioner edits `src/api/users.ts`, **Then** `api-conventions.md` is injected.\n2. **Given** the same new rule file, **When** the practitioner edits `src/components/Button.tsx`, **Then** `api-conventions.md` is NOT injected.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST load rule files from `.claude/rules/` conditionally, injecting a rule file into a turn only when at least one file edited during that turn matches a `paths` glob declared in that rule file's YAML frontmatter."},{"id":"FR-002","text":"The system MUST NOT inject any rule file into turns where no edited file matches any declared pattern (defends against the always-on anti-pattern that wastes tokens)."},{"id":"FR-003","text":"The system MUST validate each rule file's frontmatter at load time, requiring a `paths` key whose value is a non-empty list of glob strings; invalid frontmatter MUST produce an explicit error message that identifies the offending file and the failure reason."},{"id":"FR-004","text":"The system MUST deterministically resolve pattern overlaps using a documented precedence order (e.g. alphabetical filename ascending, or an explicit `priority` frontmatter field when declared) so two runs over the same edits produce the same activation set in the same order."},{"id":"FR-005","text":"The system MUST record, per turn, which rule files activated and which edited path triggered each activation, producing an auditable activation log that the practitioner can inspect."},{"id":"FR-006","text":"The system MUST treat rule files whose patterns match nothing in the current turn as inert — they MUST NOT contribute any tokens to that turn's context."},{"id":"FR-007","text":"The system MUST restrict domain-specific rules to `.claude/rules/` path-scoped files; domain-specific heuristics MUST NOT be placed in the global `CLAUDE.md` (defends against the anti-pattern of globally broadcasting narrow rules)."}],"successCriteria":[{"id":"SC-001","text":"Token cost for a turn that edits only files unmatched by any rule file is unchanged when new rule files are added to `.claude/rules/` (measured: baseline turn token count equals post-addition turn token count within a small measurement tolerance)."},{"id":"SC-002","text":"100% of turns that edit at least one file matching a declared pattern result in the correct rule file(s) appearing in the activation audit log (measured against a fixture set of edit scenarios)."},{"id":"SC-003","text":"100% of rule files with invalid frontmatter produce an explicit, human-readable error at load time — zero instances of silent skip."},{"id":"SC-004","text":"The rule-activation audit log is complete: for every turn that edits files, the log lists every rule file that activated and the specific path that triggered each activation, with no missing entries across a test suite of representative edit scenarios."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (shared workshop baseline — Kata 1 plan)."},{"label":"Primary Dependencies","value":"- `pydantic` v2 — frontmatter schema enforcement on `RuleFile`"},{"label":"Storage","value":"Local filesystem only. Rule files live at"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance scenarios; plain pytest for"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — kata module under"},{"label":"Performance Goals","value":"Not latency-bound. Loader over a fixture directory of"},{"label":"Constraints","value":"- Frontmatter parse errors MUST raise `FrontmatterError` with the offending"},{"label":"Scale/Scope","value":"One kata, ~250–400 LOC implementation + comparable test"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/009-path-rules","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The system MUST load rule files from `.claude/rules/` conditionally, injecting a rule file into a turn only when at least one file edited during that turn matches a `paths` glob declared in that rule file's YAML frontmatter."},{"id":"FR-002","text":"The system MUST NOT inject any rule file into turns where no edited file matches any declared pattern (defends against the always-on anti-pattern that wastes tokens)."},{"id":"FR-003","text":"The system MUST validate each rule file's frontmatter at load time, requiring a `paths` key whose value is a non-empty list of glob strings; invalid frontmatter MUST produce an explicit error message that identifies the offending file and the failure reason."},{"id":"FR-004","text":"The system MUST deterministically resolve pattern overlaps using a documented precedence order (e.g. alphabetical filename ascending, or an explicit `priority` frontmatter field when declared) so two runs over the same edits produce the same activation set in the same order."},{"id":"FR-005","text":"The system MUST record, per turn, which rule files activated and which edited path triggered each activation, producing an auditable activation log that the practitioner can inspect."},{"id":"FR-006","text":"The system MUST treat rule files whose patterns match nothing in the current turn as inert — they MUST NOT contribute any tokens to that turn's context."},{"id":"FR-007","text":"The system MUST restrict domain-specific rules to `.claude/rules/` path-scoped files; domain-specific heuristics MUST NOT be placed in the global `CLAUDE.md` (defends against the anti-pattern of globally broadcasting narrow rules)."},{"id":"SC-001","text":"Token cost for a turn that edits only files unmatched by any rule file is unchanged when new rule files are added to `.claude/rules/` (measured: baseline turn token count equals post-addition turn token count within a small measurement tolerance)."},{"id":"SC-002","text":"100% of turns that edit at least one file matching a declared pattern result in the correct rule file(s) appearing in the activation audit log (measured against a fixture set of edit scenarios)."},{"id":"SC-003","text":"100% of rule files with invalid frontmatter produce an explicit, human-readable error at load time — zero instances of silent skip."},{"id":"SC-004","text":"The rule-activation audit log is complete: for every turn that edits files, the log lists every rule file that activated and the specific path that triggered each activation, with no missing entries across a test suite of representative edit scenarios."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"010-prefix-caching":{"board":{"todo":[{"id":"US1","title":"Sequential Requests Hit the Cache","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Anti-Pattern Defense: Prefix Mutation Breaks Caching","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Dynamic Suffix Changes Preserve Prefix Cache","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Sequential Requests Hit the Cache","priority":"P1","scenarioCount":2,"body":"A practitioner sends N consecutive requests that share a large static preamble (system instructions, repository context, tool definitions) and only vary in the dynamic suffix. After the first request warms the cache, subsequent requests report cache hits on the shared prefix and a dramatic drop in billable input tokens.\n\n**Why this priority**: This is the core economic outcome of the kata. Without demonstrable cache reuse across sequential calls, the entire optimization is unobservable and the cost target cannot be met.\n\n**Independent Test**: Run the kata runner with a fixed static prefix and a set of varied dynamic suffixes; assert that cache-hit metrics on runs 2..N exceed the declared threshold and that per-request input cost drops by the declared percentage relative to run 1.\n\n**Acceptance Scenarios**:\n\n1. **Given** a prompt composed of a static prefix above the minimum cacheable size and a small dynamic suffix, **When** the practitioner issues the same composition twice back-to-back with different suffix content, **Then** the second response reports a non-zero cache-read token count on the static prefix and the billable (non-cached) input cost drops to approximately the declared target of the baseline.\n2. **Given** a sequence of N requests sharing the same static prefix, **When** they run within the cache TTL window, **Then** runs 2..N each report cache hits covering the full static prefix region.","clarificationCount":0},{"id":"US2","title":"Anti-Pattern Defense: Prefix Mutation Breaks Caching","priority":"P2","scenarioCount":2,"body":"A practitioner deliberately injects a volatile value (e.g., a timestamp or request ID) at the very top of the prompt, ahead of the static preamble. The run demonstrates that the cache-hit rate collapses, proving that the strict-prefix-match behavior of the API is sensitive to any early mutation.\n\n**Why this priority**: The kata's educational value depends on the practitioner internalizing why prefix mutation is catastrophic. This story makes the failure mode concrete and measurable rather than theoretical.\n\n**Independent Test**: Re-run the P1 sequence after prepending a per-request timestamp to the prompt; assert that cache-hit metrics fall to approximately zero and that input cost returns to the uncached baseline.\n\n**Acceptance Scenarios**:\n\n1. **Given** the same static prefix and dynamic suffix as User Story 1, **When** a per-request timestamp is prepended ahead of the static region, **Then** every run reports zero cache hits on the static prefix and input cost equals the uncached baseline.\n2. **Given** a PR that reorders content so volatile values appear before the static region, **When** CI runs the prefix-integrity lint, **Then** the build fails and the offending line is reported.","clarificationCount":0},{"id":"US3","title":"Dynamic Suffix Changes Preserve Prefix Cache","priority":"P3","scenarioCount":2,"body":"A practitioner modifies only the dynamic suffix (user question, session state, timestamp reminder) between consecutive runs while keeping the static prefix byte-identical. Cache hits on the prefix are preserved across all runs regardless of suffix content.\n\n**Why this priority**: This confirms the positive invariant complementary to Story 2: the suffix is the only safe place for variability, and arbitrary suffix edits do not invalidate the prefix.\n\n**Independent Test**: Run a sequence where each request has a distinct suffix but a byte-identical static region; assert prefix cache hits on runs 2..N regardless of suffix content, length, or structure.\n\n**Acceptance Scenarios**:\n\n1. **Given** a byte-identical static prefix across runs, **When** the dynamic suffix changes arbitrarily between runs, **Then** the prefix cache still reports hits on runs 2..N.\n2. **Given** a dynamic suffix that grows in length between runs, **When** the prefix remains unchanged, **Then** cache reads still cover the full static prefix region.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST place all static content (system instructions, repository context such as CLAUDE.md, tool definitions) strictly before any dynamic content in the composed prompt."},{"id":"FR-002","text":"System MUST treat tool definitions and system instructions as part of the static prefix region and never interpolate per-request values into them."},{"id":"FR-003","text":"System MUST confine all volatile or per-request values (user input, timestamps, session identifiers, ephemeral state) to a declared dynamic-suffix region delimited by reminder tags or an equivalent convention."},{"id":"FR-004","text":"System MUST report a measurable cache-hit rate and a cached-vs-uncached input token breakdown for every run."},{"id":"FR-005","text":"System MUST flag any prefix mutation during code review via an automated lint step, and the CI gate MUST fail on detection."},{"id":"FR-006","text":"System MUST distinguish intentional prefix changes (declared in the PR) from accidental prefix mutation in its metrics and lint output."},{"id":"FR-007","text":"System MUST declare and document the minimum cacheable prefix size threshold and MUST emit a warning when a run falls below it."}],"successCriteria":[{"id":"SC-001","text":"Cache-hit rate is greater than or equal to the declared target threshold across the test run (runs 2..N within the cache TTL window)."},{"id":"SC-002","text":"Input token cost per request after the first drops by the declared percentage (target: billable input cost reduced to approximately 10% of the uncached baseline)."},{"id":"SC-003","text":"Zero volatile tokens are detected in the static prefix region by the lint step across the entire repository."},{"id":"SC-004","text":"Pull requests that mutate the static prefix (without an explicit declared change) fail CI on the prefix-integrity check."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — **load-bearing**. The composer emits"},{"label":"Storage","value":"Local filesystem only. Recorded fixtures under"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance scenarios; plain pytest for"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — one kata module at"},{"label":"Performance Goals","value":"Not latency-bound. Offline acceptance run completes in"},{"label":"Constraints","value":"- Static blocks below the API's minimum cacheable size MUST NOT carry"},{"label":"Scale/Scope","value":"One kata, ~350–500 LOC implementation + comparable test"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/010-prefix-caching","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST place all static content (system instructions, repository context such as CLAUDE.md, tool definitions) strictly before any dynamic content in the composed prompt."},{"id":"FR-002","text":"System MUST treat tool definitions and system instructions as part of the static prefix region and never interpolate per-request values into them."},{"id":"FR-003","text":"System MUST confine all volatile or per-request values (user input, timestamps, session identifiers, ephemeral state) to a declared dynamic-suffix region delimited by reminder tags or an equivalent convention."},{"id":"FR-004","text":"System MUST report a measurable cache-hit rate and a cached-vs-uncached input token breakdown for every run."},{"id":"FR-005","text":"System MUST flag any prefix mutation during code review via an automated lint step, and the CI gate MUST fail on detection."},{"id":"FR-006","text":"System MUST distinguish intentional prefix changes (declared in the PR) from accidental prefix mutation in its metrics and lint output."},{"id":"FR-007","text":"System MUST declare and document the minimum cacheable prefix size threshold and MUST emit a warning when a run falls below it."},{"id":"SC-001","text":"Cache-hit rate is greater than or equal to the declared target threshold across the test run (runs 2..N within the cache TTL window)."},{"id":"SC-002","text":"Input token cost per request after the first drops by the declared percentage (target: billable input cost reduced to approximately 10% of the uncached baseline)."},{"id":"SC-003","text":"Zero volatile tokens are detected in the static prefix region by the lint step across the entire repository."},{"id":"SC-004","text":"Pull requests that mutate the static prefix (without an explicit declared change) fail CI on the prefix-integrity check."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"006-mcp-errors":{"board":{"todo":[{"id":"US1","title":"Transient Failure with Successful Retry","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Validation Failure Routes to Escalation","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Structured Error Log Inspection and Classification","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Transient Failure with Successful Retry","priority":"P1","scenarioCount":3,"body":"A workshop practitioner invokes an external tool through an MCP server that is\ntemporarily unavailable (for example, a rate-limit or transient backend error).\nThe tool returns an MCP response with `isError=true` and a structured payload\ncontaining `errorCategory`, `isRetryable=true`, and a detailed explanation. The\nagent reads the metadata, adjusts its call (backoff or payload tweak) within\nthe configured retry budget, and the next attempt succeeds.\n\n**Why this priority**: This is the canonical motivating scenario of the kata.\nWithout it, the agent gains nothing over the anti-pattern \"Operation failed\"\nstring. Delivering P1 alone proves the structured-error contract works end to\nend and is a viable MVP of the kata.\n\n**Independent Test**: Can be fully tested by forcing an MCP-exposed tool to\nfail transiently once, observing that the agent receives the structured error,\napplies local recovery, and the second invocation succeeds — all without human\nintervention.\n\n**Acceptance Scenarios**:\n\n1. **Given** an MCP server exposes a tool that will fail transiently on its\n   first call, **When** the agent invokes the tool, **Then** the response\n   carries `isError=true`, `errorCategory`, `isRetryable=true`, and an\n   explanation field.\n2. **Given** the structured error signals `isRetryable=true` and the retry\n   budget is not exhausted, **When** the agent adjusts its payload and retries,\n   **Then** the subsequent invocation completes successfully and the agent\n   surfaces the final result to the practitioner.\n3. **Given** a transient failure was retried and resolved, **When** the\n   practitioner inspects the run log, **Then** both the structured error and\n   the successful retry are recorded with full metadata.","clarificationCount":0},{"id":"US2","title":"Validation Failure Routes to Escalation","priority":"P2","scenarioCount":3,"body":"A practitioner triggers an external tool with input that violates the tool's\nvalidation rules (e.g., malformed identifier, unsupported enum value). The MCP\nresponse returns `isError=true`, `errorCategory` identifying a validation\nclass, `isRetryable=false`, and an explanation. The agent does NOT retry; it\nroutes the failure to the escalation path defined by policy (handoff,\nuser-facing clarification prompt, or abort), directly defending against the\nanti-pattern of blind retries on a generic \"Operation failed\" string.\n\n**Why this priority**: This story encodes the anti-pattern defense that the\nkata explicitly targets. It proves the metadata is used to branch behavior,\nnot just decorate logs.\n\n**Independent Test**: Can be fully tested by sending an input known to fail\nvalidation on the MCP-exposed tool and verifying the agent takes the\nescalation branch on the first failure, with zero retries executed.\n\n**Acceptance Scenarios**:\n\n1. **Given** a tool call whose input fails validation, **When** the MCP\n   response returns `isRetryable=false` with a validation `errorCategory`,\n   **Then** the agent performs zero retries against that tool call.\n2. **Given** `isRetryable=false`, **When** the agent processes the structured\n   error, **Then** it invokes the policy-defined escalation action (human\n   handoff, clarification request, or abort with explanation) and records the\n   branch taken.\n3. **Given** the escalation path completes, **When** the practitioner reviews\n   the trace, **Then** it is unambiguous which `errorCategory` drove the\n   escalation and no generic failure string appears in the agent context.","clarificationCount":0},{"id":"US3","title":"Structured Error Log Inspection and Classification","priority":"P3","scenarioCount":2,"body":"A practitioner reviews the structured error log after a workshop session and\nclassifies failures by `errorCategory` and `isRetryable`, producing a summary\nof how many failures were transient, validation, or non-retryable, and how\nmany were resolved under the retry budget versus escalated.\n\n**Why this priority**: This story delivers the observability / docs principle\n(Constitution VIII) and enables continuous improvement of the kata, but the\nsystem can function with only P1 and P2 in place.\n\n**Independent Test**: Can be fully tested by running a session with a mix of\ntransient and validation failures, opening the structured error log, and\nconfirming every entry can be grouped by category and retryability without\nneeding to read free-form messages.\n\n**Acceptance Scenarios**:\n\n1. **Given** a completed session containing at least one transient and one\n   validation failure, **When** the practitioner opens the structured error\n   log, **Then** each entry exposes `errorCategory`, `isRetryable`, the\n   explanation, and the outcome (retried-success, retried-exhausted,\n   escalated, aborted).\n2. **Given** the log is loaded, **When** the practitioner filters by\n   `errorCategory`, **Then** the count per category and per retryability flag\n   is derivable without parsing free-text messages.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST flag every failed MCP tool invocation with"},{"id":"FR-002","text":"The system MUST include, on every failure response, an"},{"id":"FR-003","text":"The system MUST NOT emit generic failure strings (e.g.,"},{"id":"FR-004","text":"The agent MUST branch its behavior on the structured metadata:"},{"id":"FR-005","text":"The system MUST enforce a configurable retry budget per tool"},{"id":"FR-006","text":"The system MUST log every structured error with full metadata"},{"id":"FR-007","text":"When the MCP response is missing required structured fields or"},{"id":"FR-008","text":"The system MUST keep escalation policy (who or what receives a"}],"successCriteria":[{"id":"SC-001","text":"100% of observed tool failures in a workshop run carry both an"},{"id":"SC-002","text":"0 generic failure
