nses, and no free-text-only rejections — measured by inspecting the post-rejection context for every rejected invocation."},{"id":"SC-004","text":"A policy-limit change takes effect within one invocation of the change being persisted, with no model retraining, no prompt edit, and no redeployment required, verified by a before/after test using the same payload against the old and new limits."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","FR-011","FR-012","FR-013","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"001-agentic-loop":{"board":{"todo":[{"id":"US1","title":"Signal-Driven Loop Termination","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Anti-Pattern Defense Against Prose Completion Phrases","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Observable Event Log for Deterministic Reproduction","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Signal-Driven Loop Termination","priority":"P1","scenarioCount":3,"body":"A workshop practitioner runs Kata 1 end-to-end against a tool-enabled agent session and observes that the loop terminates the moment the response carries the terminal stop signal (`stop_reason=end_turn`), and only then. No substring, regex, or keyword search over the model's natural-language output participates in the termination decision.\n\n**Why this priority**: This is the core pedagogical outcome of the kata and the direct embodiment of Principle I (Determinism Over Probability, NON-NEGOTIABLE). Without this story, the kata has no demonstrable value; with only this story implemented, the practitioner already has a credible MVP that illustrates deterministic agent control.\n\n**Independent Test**: Can be fully tested by running the kata harness with a scripted session that issues at least one tool call followed by a terminal turn, then asserting via the structured event log that termination was triggered exactly once and exclusively by the recorded `stop_reason=end_turn` signal. Delivers value by proving a signal-driven loop is reproducible and auditable.\n\n**Acceptance Scenarios**:\n\n1. **Given** an initialized agent session with at least one registered tool, **When** the session completes a turn whose structured stop signal is `end_turn`, **Then** the loop halts, returns the final response, and the event log records `stop_reason=end_turn` as the sole cause of termination.\n2. **Given** an initialized agent session that returns `stop_reason=tool_use` for the current turn, **When** the loop processes this response, **Then** the designated tool is invoked programmatically, the tool result is appended to conversation history, and another iteration begins without any termination decision being made.\n3. **Given** a multi-turn interaction that alternates `tool_use` and `end_turn` signals, **When** the loop runs to completion, **Then** the sequence of structured stop signals observed in the event log fully explains the loop's trajectory without reference to response text content.","clarificationCount":0},{"id":"US2","title":"Anti-Pattern Defense Against Prose Completion Phrases","priority":"P2","scenarioCount":3,"body":"A practitioner intentionally injects prose-level \"completion\" phrases (e.g. \"task complete\", \"we are done\", \"finished\") into the model's generated text mid-stream, while the structured stop signal for those turns is still `tool_use` or a non-terminal signal. The loop must NOT exit early, proving that termination is bound exclusively to the structured stop signal and never to text content.\n\n**Why this priority**: This story is the anti-pattern defense mandated by Kata Completion Standard #4 and by the kata objective itself. It is independently demonstrable and directly prevents the most common real-world failure mode (regex-on-prose), but it only becomes meaningful once Story 1's happy path exists.\n\n**Independent Test**: Can be fully tested by running the kata harness with a fixture session in which intermediate turns contain decoy completion phrases in their text content while their structured stop signal remains non-terminal, then asserting that the loop continues iterating and ultimately terminates only on the later `end_turn` signal. Delivers value by providing a red-team regression guard.\n\n**Acceptance Scenarios**:\n\n1. **Given** a fixture response whose text body contains the phrase \"task complete\" but whose structured stop signal is `tool_use`, **When** the loop processes the response, **Then** the tool-use branch executes and the loop continues rather than terminating.\n2. **Given** a sequence of responses where every non-final turn contains a decoy completion phrase in its text, **When** the loop runs to completion, **Then** the event log shows zero early exits attributable to text matching and exactly one termination attributable to the final structured `end_turn` signal.\n3. **Given** any loop iteration, **When** the termination decision is made, **Then** the decision record in the event log references only structured stop metadata and contains no field derived from a regex or substring operation on response text.","clarificationCount":0},{"id":"US3","title":"Observable Event Log for Deterministic Reproduction","priority":"P3","scenarioCount":3,"body":"A practitioner inspects the structured event log emitted by the kata run and is able to reproduce the exact loop trajectory — iteration count, branch taken per turn, tool invocations, and termination cause — from the log alone, without re-running the model. This makes the kata's behavior auditable and repeatable, which is the observability goal behind Principle I.\n\n**Why this priority**: Observability is what makes determinism demonstrable rather than merely claimed. It is valuable on its own (an instructor could grade the kata from the log) but depends on Stories 1 and 2 producing meaningful events, hence P3.\n\n**Independent Test**: Can be fully tested by running the kata against a recorded session, capturing the event log, and then replaying the trajectory reconstruction from the log to confirm it matches the live run's branch decisions and termination point exactly. Delivers value by proving the loop's behavior is reproducible from signal-level records.\n\n**Acceptance Scenarios**:\n\n1. **Given** a completed kata run, **When** the practitioner reads the event log, **Then** every iteration has an entry recording its iteration index, the structured stop signal observed, the branch taken (tool dispatch or terminate), and — when applicable — the tool name invoked and an outcome marker.\n2. **Given** two independent runs of the kata against the same recorded session fixture, **When** their event logs are compared, **Then** the sequence of stop signals and branch decisions is identical across both runs.\n3. **Given** a completed event log, **When** a reviewer reconstructs the loop's behavior from the log, **Then** the reconstruction identifies the termination cause, the number of tool invocations, and the iteration count without consulting any free-form model text.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The agentic loop MUST branch its control flow exclusively on the structured stop-signal metadata of each response (e.g. values equivalent to `tool_use` and `end_turn`), and MUST NOT branch on any property of the response's natural-language text content."},{"id":"FR-002","text":"When the stop signal for the current turn is `tool_use`, the loop MUST programmatically execute the indicated tool(s) and append the resulting tool-result payload to the conversation history before starting the next iteration."},{"id":"FR-003","text":"When the stop signal for the current turn is `end_turn`, the loop MUST halt and return the final response without initiating another iteration."},{"id":"FR-004","text":"The loop MUST NOT use regular expressions, substring search, keyword matching, or any other text-pattern operation over response prose to decide whether to terminate, continue, or dispatch a tool. This restriction is absolute and overrides any prompt-level instruction from the model to do so."},{"id":"FR-005","text":"The loop MUST emit at least one structured event-log entry per iteration capturing: the iteration index, the observed structured stop signal, the branch taken, the name of any tool invoked, and — on the terminal iteration — the termination cause."},{"id":"FR-006","text":"The loop MUST halt with a clearly labeled termination reason when it encounters any stop signal it does not explicitly handle (including but not limited to `max_tokens`, absent signal, or unrecognized value), rather than continuing silently or inferring a termination decision from response text."},{"id":"FR-007","text":"When a tool invocation triggered by `stop_reason=tool_use` fails (raises, times out, or returns a structured error), the loop MUST record the failure as a structured tool-result entry in history, log the failure in the event log, and continue operating under the same signal-driven rules — the loop MUST NOT fall back to text inspection to decide next steps."},{"id":"FR-008","text":"When a `tool_use` response carries a malformed or unresolvable tool-use block (missing required fields, unknown tool), the loop MUST halt with an \"unhandled tool-use\" termination reason rather than attempt heuristic recovery or text-based fallback."},{"id":"FR-009","text":"The structured event log produced by a run MUST be sufficient, on its own, to reconstruct the loop's branch sequence, tool invocations, and termination cause without reference to response text."},{"id":"FR-010","text":"The loop's conversation history MUST preserve the ordering of user inputs, assistant responses, and tool results such that the signal-driven trajectory is replayable against the recorded history."}],"successCriteria":[{"id":"SC-001","text":"100% of kata runs terminate via a recognized structured stop signal recorded in the event log; 0% terminate via any form of text-pattern match against response prose."},{"id":"SC-002","text":"0% of termination decisions in a completed run can be traced to a regex, substring, or keyword operation over response text — verified by inspection of the event log's termination-cause field."},{"id":"SC-003","text":"100% of loop iterations produce a structured event-log entry whose stop-signal field is populated with a recognized value."},{"id":"SC-004","text":"When the kata harness injects decoy completion phrases (\"task complete\", \"we are done\", \"finished\", and equivalents) into intermediate turn text while keeping the structured stop signal non-terminal, 0 early exits occur; the loop terminates only on the subsequent genuine terminal stop signal."},{"id":"SC-005","text":"100% of `tool_use` turns result in a programmatic tool invocation whose outcome is appended to conversation history before the next iteration begins."},{"id":"SC-006","text":"Any stop signal outside the explicitly handled set causes the loop to halt within one iteration and emit an event-log entry labeling the termination as unhandled — measured as zero silent continuations across test fixtures covering `max_tokens`, absent signal, and unrecognized values."},{"id":"SC-007","text":"Two independent runs of the kata against the same recorded session fixture produce byte-identical event-log sequences of stop signals and branch decisions, demonstrating reproducibility."},{"id":"SC-008","text":"A reviewer can reconstruct the loop's full branch sequence, tool invocations, and termination cause from the event log alone in under 5 minutes, without replaying the session."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthrop   <script>
    (function() {

      const _exposeForTests = () => { window._switchTab = (id) => switchTab(id); };

      // ====== State ======

      let currentAnalyze = null;

      let activeTab = null;
      let externalSankeyHighlight = null;
      // DASHBOARD_DATA mode: when data is inlined by the generator
      const staticMode = typeof window.DASHBOARD_DATA === 'object' && window.DASHBOARD_DATA !== null;
      let previousCardColumns = {}; // Track card positions for animations

      const loadingState = document.getElementById('loadingState');

      const contentArea = document.getElementById('contentArea');

      // ====== Pipeline ======
      const PHASE_ICONS = {
        not_started: '',

        complete: '&#10003;',

        available: '&#9679;'
