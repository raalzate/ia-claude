step is drawn from the revised plan, not the stale plan.\n3. **Given** the surprise specifically requires isolation (for example, an external network call), **When** the revised plan is emitted, **Then** a mocking or isolation step is inserted before any step that would exercise the dependency.","clarificationCount":0},{"id":"US3","title":"Bounded Exploration Still Produces a Plan","priority":"P3","scenarioCount":3,"body":"A practitioner caps the agent's exploration budget (wall-clock time, iteration count, or tool-call count) and verifies that the agent still produces a structured, prioritized plan within that budget — even if the topology mapping is incomplete. The agent must not explore indefinitely in pursuit of a \"perfect\" map; it must converge.\n\n**Why this priority**: Directly defends the second anti-pattern: exploring endlessly without ever producing a structured plan. P3 because it is a safety rail on top of P1 and P2 rather than the primary value driver.\n\n**Independent Test**: The practitioner sets a tight budget on a large codebase, runs the agent, and verifies that (a) the budget was respected, (b) a structured plan was nevertheless emitted, and (c) the plan is explicitly annotated as \"budget-limited / partial topology\" so downstream consumers understand its confidence level.\n\n**Acceptance Scenarios**:\n\n1. **Given** an exploration budget of B (time, iterations, or tool calls), **When** the agent is run against a codebase too large to fully map within B, **Then** the agent halts exploration at or before B and emits a structured plan.\n2. **Given** the agent halted due to budget exhaustion, **When** the plan is inspected, **Then** it carries an explicit \"partial topology\" or \"budget-limited\" annotation and a confidence indicator.\n3. **Given** any run of the agent, **When** the full transcript is audited, **Then** there is no run in which the agent performs unbounded topology mapping without ever emitting a plan.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The agent MUST perform topology mapping (at minimum one filename-pattern query and one regex-search query, or a documented equivalent) before emitting any plan."},{"id":"FR-002","text":"The agent MUST emit a structured, prioritized plan (ordered items with explicit priority markers), not free-form prose."},{"id":"FR-003","text":"The agent MUST re-plan when a new discovery invalidates the currently executing step, producing a new plan revision instead of mutating the prior revision in place."},{"id":"FR-004","text":"The agent MUST enforce an exploration budget (time, iterations, or tool calls) and terminate exploration at or before budget exhaustion."},{"id":"FR-005","text":"The agent MUST log every plan revision with an explicit trigger reference (the discovery, tool failure, cycle, or budget event that caused the revision)."},{"id":"FR-006","text":"The agent MUST annotate any plan produced under a truncated or incomplete topology pass as \"partial\" or \"budget-limited\" with a confidence indicator."},{"id":"FR-007","text":"The agent MUST, when a discovery contradicts the original directive, halt and surface the contradiction rather than silently continuing."},{"id":"FR-008","text":"The agent MUST ensure each high-priority plan item traces back to at least one recorded topology finding."}],"successCriteria":[{"id":"SC-001","text":"100% of runs produce a structured prioritized plan within the configured exploration budget."},{"id":"SC-002","text":"When a practitioner injects an unexpected external dependency, the agent triggers a plan revision that addresses it in at least the target percentage of runs (target defined per evaluation cohort; minimum acceptable baseline is the rate agreed during kata calibration)."},{"id":"SC-003","text":"0 runs in which the agent explores without ever emitting a plan (no endless-exploration runs across the evaluation cohort)."},{"id":"SC-004","text":"100% of plan revisions have a logged trigger that unambiguously identifies the discovery, tool failure, cycle, contradiction, or budget event that caused them."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (matches shared baseline from"},{"label":"Primary Dependencies","value":"- `anthropic` — `Planner` and `Coordinator` drive Claude via"},{"label":"Storage","value":"Local filesystem only. Per-run artifacts written to"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit +"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project. Kata lives at"},{"label":"Performance Goals","value":"Not latency-bound. Recorded-fixture acceptance suite"},{"label":"Constraints","value":"- `katas/019_adaptive_investigation/planner.py` MUST NOT `import re`, call"},{"label":"Scale/Scope","value":"One kata, ~500–700 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/019-adaptive-investigation","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The agent MUST perform topology mapping (at minimum one filename-pattern query and one regex-search query, or a documented equivalent) before emitting any plan."},{"id":"FR-002","text":"The agent MUST emit a structured, prioritized plan (ordered items with explicit priority markers), not free-form prose."},{"id":"FR-003","text":"The agent MUST re-plan when a new discovery invalidates the currently executing step, producing a new plan revision instead of mutating the prior revision in place."},{"id":"FR-004","text":"The agent MUST enforce an exploration budget (time, iterations, or tool calls) and terminate exploration at or before budget exhaustion."},{"id":"FR-005","text":"The agent MUST log every plan revision with an explicit trigger reference (the discovery, tool failure, cycle, or budget event that caused the revision)."},{"id":"FR-006","text":"The agent MUST annotate any plan produced under a truncated or incomplete topology pass as \"partial\" or \"budget-limited\" with a confidence indicator."},{"id":"FR-007","text":"The agent MUST, when a discovery contradicts the original directive, halt and surface the contradiction rather than silently continuing."},{"id":"FR-008","text":"The agent MUST ensure each high-priority plan item traces back to at least one recorded topology finding."},{"id":"SC-001","text":"100% of runs produce a structured prioritized plan within the configured exploration budget."},{"id":"SC-002","text":"When a practitioner injects an unexpected external dependency, the agent triggers a plan revision that addresses it in at least the target percentage of runs (target defined per evaluation cohort; minimum acceptable baseline is the rate agreed during kata calibration)."},{"id":"SC-003","text":"0 runs in which the agent explores without ever emitting a plan (no endless-exploration runs across the evaluation cohort)."},{"id":"SC-004","text":"100% of plan revisions have a logged trigger that unambiguously identifies the discovery, tool failure, cycle, contradiction, or budget event that caused them."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"020-data-provenance":{"board":{"todo":[{"id":"US1","title":"Provenance-Preserving Aggregation","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Conflict Surfacing Without Silent Resolution","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Fail-Closed on Missing Provenance Schema","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Provenance-Preserving Aggregation","priority":"P1","scenarioCount":3,"body":"A practitioner submits multiple corporate manuals to a fleet of subagents and receives a structured JSON list where every factual claim is tagged with its originating `source_url`, `source_name`, and `publication_date`. No claim is ever stripped of its provenance or fused into an anonymous summary paragraph.\n\n**Why this priority**: This is the core auditability promise of Kata 20. Without preserved provenance, every downstream decision rests on unverifiable assertions — exactly the hallucination surface the workshop is teaching practitioners to eliminate (Constitution VII).\n\n**Independent Test**: Can be fully tested by passing two distinct manuals to two subagents, requesting claim extraction, and verifying each emitted claim includes all three provenance fields populated and traceable back to the exact source document.\n\n**Acceptance Scenarios**:\n\n1. **Given** two corporate manuals ingested by two isolated subagents, **When** the aggregator requests claim extraction, **Then** the output is a JSON array of claims where each entry contains non-empty `claim`, `source_url`, `source_name`, and `publication_date` fields.\n2. **Given** a single factual claim appears in a source manual, **When** the pipeline emits it, **Then** the emitted record links back to the exact source document and is not merged into a prose summary.\n3. **Given** an aggregation of N manuals, **When** the output is inspected, **Then** zero claims appear without provenance metadata (no amalgamated paragraphs, no orphan sentences).","clarificationCount":0},{"id":"US2","title":"Conflict Surfacing Without Silent Resolution","priority":"P2","scenarioCount":3,"body":"A practitioner deliberately seeds two manuals with contradictory numbers for the same quantity. The aggregated output flags the disagreement with an explicit `conflict_detected=true` marker, preserves both claims under their original provenance JSON blocks, and routes the resolution to a human coordinator instead of silently picking a winner.\n\n**Why this priority**: This directly defends the primary anti-pattern of Kata 20 — the model \"arbitrarily picking\" a truth when sources disagree. Surfacing conflicts keeps the human in the loop (Constitution VII) and prevents fabricated consensus.\n\n**Independent Test**: Can be fully tested by planting two contradictory facts across two manuals, running the aggregation, and asserting both original claims (with provenance) are present in the output under a `conflict_detected` block with a human-review hand-off, and that neither claim has been dropped or merged.\n\n**Acceptance Scenarios**:\n\n1. **Given** two manuals with conflicting numeric claims for the same fact, **When** aggregation completes, **Then** the output contains a `conflict_detected=true` marker with both claims as full provenance records.\n2. **Given** a detected conflict, **When** the pipeline reports it, **Then** a human-review task is created and the pipeline does NOT emit a single \"winning\" value.\n3. **Given** two sources agree, **When** aggregated, **Then** no `conflict_detected` marker is emitted (no false positives).","clarificationCount":0},{"id":"US3","title":"Fail-Closed on Missing Provenance Schema","priority":"P3","scenarioCount":3,"body":"A practitioner removes one or more provenance fields (`source_url`, `source_name`, or `publication_date`) from the extraction schema request. The pipeline refuses to proceed rather than emit orphan claims, returning a schema-validation failure that names the missing fields.\n\n**Why this priority**: This defends the schema-enforced-boundary principle (Constitution II) and prevents a regression where a practitioner accidentally loosens the contract and silently loses metadata. The pipeline must fail closed.\n\n**Independent Test**: Can be fully tested by submitting a schema missing a required provenance field and verifying the pipeline raises a structured validation error (not a warning, not partial output) that lists the omitted field(s).\n\n**Acceptance Scenarios**:\n\n1. **Given** a schema that omits `source_url`, **When** the pipeline is invoked, **Then** execution halts with a validation error naming the missing field, and no claims are emitted.\n2. **Given** a schema missing `publication_date`, **When** the pipeline runs, **Then** a fail-closed error is returned and zero partial results leak downstream.\n3. **Given** a fully-specified schema, **When** the pipeline runs, **Then** it proceeds normally with provenance-complete output.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST emit every factual claim as a structured record containing `claim`, `source_url`, `source_name`, and `publication_date` fields, all populated from the originating source."},{"id":"FR-002","text":"System MUST reject any claim that lacks one or more required provenance fields and MUST NOT emit orphan claims downstream."},{"id":"FR-003","text":"System MUST detect conflicts — defined as two or more claims asserting contradictory values for the same underlying fact — and mark them with an explicit `conflict_detected=true` flag in the output."},{"id":"FR-004","text":"System MUST NOT auto-resolve detected conflicts by picking a source heuristically, by recency, by majority vote, or by any model-internal preference."},{"id":"FR-005","text":"System MUST route every detected conflict to a human coordinator as an explicit review task, preserving both (or all) original provenance JSON blocks in the hand-off payload."},{"id":"FR-006","text":"System MUST log every aggregation pass with the set of source documents consulted, the number of claims emitted, and the number of conflicts surfaced, for self-audit and provenance replay."},{"id":"FR-007","text":"System MUST forbid subagents from producing amalgamated prose summaries as their output contract; subagent outputs MUST be schema-validated JSON claim lists."},{"id":"FR-008","text":"System MUST preserve duplicate claims from different sources as separate provenance records rather than deduplicating them into a single metadata-less entry."}],"successCriteria":[{"id":"SC-001","text":"100% of emitted claims have populated `source_url`, `source_name`, and `publication_date` fields across the full labeled corpus."},{"id":"SC-002","text":"0 auto-resolved conflicts across the labeled corpus — every seeded contradiction surfaces as an explicit `conflict_detected` record routed to human review."},{"id":"SC-003","text":"Conflict detection recall is at or above the workshop target on the seeded conflict set (no planted contradiction is missed)."},{"id":"SC-004","text":"Orphan-claim rejection rate equals 100% on the negative test set — every schema request missing a required provenance field fails closed with a structured validation error."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (matches Kata 1 baseline in"},{"label":"Primary Dependencies","value":"- `anthropic` — each Subagent opens its own `anthropic.Anthropic().messages.create`"},{"label":"Storage","value":"Local filesystem only. Per-run artifacts at `runs/<session-id>/`"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit + lint."},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project. Kata at `katas/020_data_provenance/`; tests"},{"label":"Performance Goals","value":"Not latency-bound. Recorded-fixture acceptance suite"},{"label":"Constraints","value":"- Every emitted `Claim` MUST have populated `claim`, `source_name`, and a"},{"label":"Scale/Scope","value":"One kata, ~500–700 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/020-data-provenance","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST emit every factual claim as a structured record containing `claim`, `source_url`, `source_name`, and `publication_date` fields, all populated from the originating source."},{"id":"FR-002","text":"System MUST reject any claim that lacks one or more required provenance fields and MUST NOT emit orphan claims downstream."},{"id":"FR-003","text":"System MUST detect conflicts — defined as two or more claims asserting contradictory values for the same underlying fact — and mark them with an explicit `conflict_detected=true` flag in the output."},{"id":"FR-004","text":"System MUST NOT auto-resolve detected conflicts by picking a source heuristically, by recency, by majority vote, or by any model-internal preference."},{"id":"FR-005","text":"System MUST route every detected conflict to a human coordinator as an explicit review task, preserving both (or all) original provenance JSON blocks in the hand-off payload."},{"id":"FR-006","text":"System MUST log every aggregation pass with the set of source documents consulted, the number of claims emitted, and the number of conflicts surfaced, for self-audit and provenance replay."},{"id":"FR-007","text":"System MUST forbid subagents from producing amalgamated prose summaries as their output contract; subagent outputs MUST be schema-validated JSON claim lists."},{"id":"FR-008","text":"System MUST preserve duplicate claims from different sources as separate provenance records rather than deduplicating them into a single metadata-less entry."},{"id":"SC-001","text":"100% of emitted claims have populated `source_url`, `source_name`, and `publication_date` fields across the full labeled corpus."},{"id":"SC-002","text":"0 auto-resolved conflicts across the labeled corpus — every seeded contradiction surfaces as an explicit `conflict_detected` record routed to human review."},{"id":"SC-003","text":"Conflict detection recall is at or above the workshop target on the seeded conflict set (no planted contradiction is missed)."},{"id":"SC-004","text":"Orphan-claim rejection rate equals 100% on the negative test set — every schema request missing a required provenance field fails closed with a structured validation error."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"018-scratchpad-persistence":{"board":{"todo":[{"id":"US1","title":"Long Investigation with Incremental Persistence","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Compaction Survival and Non-Rediscovery","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Machine-Parseable Structure on Inspection","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Long Investigation with Incremental Persistence","priority":"P1","scenarioCount":3,"body":"A practitioner launches an exploratory agent to navigate deep routing or architecture logic in an unfamiliar codebase. As the agent uncovers each critical finding (entry points, dependency edges, invariants, suspected bugs), it appends that finding to a declared scratchpad file on disk before continuing. The scratchpad is populated transactionally rather than at the end of the session, so no single context event can erase what was learned.\n\n**Why this priority**: Without durable capture at the moment of discovery, every insight lives only in volatile conversational context. This is the foundational behavior that makes all other scratchpad guarantees possible — if findings are not written out as they occur, nothing downstream can recover them.\n\n**Independent Test**: Run an exploratory investigation for at least three distinct discoveries, terminate the session abruptly, then inspect the scratchpad file. All three findings must be present, each in its declared section, without needing any post-session save step.\n\n**Acceptance Scenarios**:\n\n1. **Given** a fresh investigation session with no existing scratchpad, **When** the agent makes its first critical finding, **Then** the scratchpad file is created with the declared section structure and the finding is written into the correct section.\n2. **Given** an active investigation with N prior findings already in the scratchpad, **When** the agent makes a new finding, **Then** the new finding is appended without modifying or reordering existing entries.\n3. **Given** an investigation in progress, **When** the session is terminated without any explicit save action, **Then** every finding that was acknowledged before termination is already on disk.","clarificationCount":0},{"id":"US2","title":"Compaction Survival and Non-Rediscovery","priority":"P2","scenarioCount":3,"body":"A practitioner is deep in an investigation when the agent reaches 50–60% context fill and must apply `/compact` or start a fresh session. On reload, the agent reads the scratchpad as its context anchor before doing any new work. The practitioner then asks a follow-up question whose answer depends on earlier findings. The agent answers correctly from the scratchpad and does not re-run the exploratory steps that produced those findings.\n\n**Why this priority**: This is the defining anti-pattern defense. The kata exists because agents that hold discoveries only inside the live conversation silently lose them after compaction, forcing wasteful rediscovery. A scratchpad that is written but never read back provides no value — this story proves the round trip.\n\n**Independent Test**: Produce a scratchpad containing at least five tracked facts, force `/compact` or a new session, then issue a query that requires those facts. Verify zero rediscovery tool calls were made and the answer matches the recorded facts.\n\n**Acceptance Scenarios**:\n\n1. **Given** a scratchpad with recorded findings exists, **When** a new session starts, **Then** the agent reads the scratchpad before accepting its first user query.\n2. **Given** a post-compaction session, **When** the practitioner asks about a topic covered by a previously recorded finding, **Then** the agent cites the scratchpad entry and performs no rediscovery exploration for that fact.\n3. **Given** an agent that has just reloaded the scratchpad, **When** a new finding contradicts a recorded one, **Then** the agent surfaces the conflict rather than silently overwriting.","clarificationCount":0},{"id":"US3","title":"Machine-Parseable Structure on Inspection","priority":"P3","scenarioCount":3,"body":"A practitioner opens the scratchpad directly to audit what the agent has learned. The file is organized into declared, named sections (not a single prose blob), each finding carries enough metadata to be located and understood out of context, and the file can be mechanically parsed for downstream tooling.\n\n**Why this priority**: The anti-pattern of \"unstructured prose dumped into a scratchpad\" makes the file unusable on reload and defeats the purpose of persistence. Structure is what makes the file useful as a context anchor for future sessions and for humans performing review.\n\n**Independent Test**: Take a scratchpad produced by a real investigation and run a structural validator against its declared schema. 100% of findings must live under a recognized section and include the required fields.\n\n**Acceptance Scenarios**:\n\n1. **Given** a populated scratchpad, **When** a parser reads the file, **Then** every finding maps to exactly one declared section and exposes its required fields.\n2. **Given** a practitioner opens the scratchpad, **When** they scan it visually, **Then** sections are clearly delimited and findings are individually identifiable rather than merged into prose.\n3. **Given** a finding lacking required metadata, **When** it is written, **Then** the write is rejected or the missing metadata is flagged for follow-up.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The agent MUST persist every critical finding to a declared scratchpad file at the moment the finding is made, not batched to end-of-session."},{"id":"FR-002","text":"The scratchpad MUST conform to a declared section structure; every written finding belongs to exactly one named section."},{"id":"FR-003","text":"At session start, the agent MUST read the scratchpad if it exists and treat its contents as authoritative prior context before answering any new query."},{"id":"FR-004","text":"The system MUST detect when a new finding conflicts with an existing recorded finding and flag both entries rather than silently overwriting."},{"id":"FR-005","text":"The system MUST enforce a declared size cap on the scratchpad and trigger a rotation event when the cap is reached, preserving prior content in an archive rather than deleting it."},{"id":"FR-006","text":"Each finding MUST carry the metadata required by the declared section schema (for example: identifier, timestamp, source query, section tag) so it is interpretable out of conversational context."},{"id":"FR-007","text":"When the declared scratchpad path is missing at session start, the agent MUST proceed as a cold start and create the file on first write rather than erroring out."},{"id":"FR-008","text":"Writes to the scratchpad MUST be atomic with respect to process termination; a crashed write must leave the file in a parseable state."},{"id":"FR-009","text":"After a `/compact` or equivalent loop reset, the agent MUST re-read the scratchpad before accepting the next user query."},{"id":"FR-010","text":"The scratchpad MUST be machine-parseable against its declared schema; unstructured prose dumps are a defect, not an acceptable form of capture."}],"successCriteria":[{"id":"SC-001","text":"Post-compaction rediscovery rate of tracked facts is 0 — across test runs, zero findings already present in the scratchpad are re-derived by the agent after a `/compact` or session reload."},{"id":"SC-002","text":"100% of findings captured in any test run conform to the declared section schema (correct section assignment and all required metadata fields present)."},{"id":"SC-003","text":"The scratchpad is successfully read by the agent at session start in 100% of test runs where the file exists, and a missing file results in a clean cold start in 100% of runs where it does not."},{"id":"SC-004","text":"The declared size cap is never exceeded without a rotation event being emitted — across all test runs, no observation of an active scratchpad larger than the cap."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — sole transport for the compact-resume"},{"label":"Storage","value":"Local filesystem only. Per-run artifacts under"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit. Default"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — one kata module under"},{"label":"Performance Goals","value":"Not latency-bound. Offline acceptance completes under 5"},{"label":"Constraints","value":"- Every write MUST go through `ScratchpadWriter`; direct file rewrites outside"},{"label":"Scale/Scope","value":"One kata, ~500–700 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/018-scratchpad-persistence","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The agent MUST persist every critical finding to a declared scratchpad file at the moment the finding is made, not batched to end-of-session."},{"id":"FR-002","text":"The scratchpad MUST conform to a declared section structure; every written finding belongs to exactly one named section."},{"id":"FR-003","text":"At session start, the agent MUST read the scratchpad if it exists and treat its contents as authoritative prior context before answering any new query."},{"id":"FR-004","text":"The system MUST detect when a new finding conflicts with an existing recorded finding and flag both entries rather than silently overwriting."},{"id":"FR-005","text":"The system MUST enforce a declared size cap on the scratchpad and trigger a rotation event when the cap is reached, preserving prior content in an archive rather than deleting it."},{"id":"FR-006","text":"Each finding MUST carry the metadata required by the declared section schema (for example: identifier, timestamp, source query, section tag) so it is interpretable out of conversational context."},{"id":"FR-007","text":"When the declared scratchpad path is missing at session start, the agent MUST proceed as a cold start and create the file on first write rather than erroring out."},{"id":"FR-008","text":"Writes to the scratchpad MUST be atomic with respect to process termination; a crashed write must leave the file in a parseable state."},{"id":"FR-009","text":"After a `/compact` or equivalent loop reset, the agent MUST re-read the scratchpad before accepting the next user query."},{"id":"FR-010","text":"The scratchpad MUST be machine-parseable against its declared schema; unstructured prose dumps are a defect, not an acceptable form of capture."},{"id":"SC-001","text":"Post-compaction rediscovery rate of tracked facts is 0 — across test runs, zero findings already present in the scratchpad are re-derived by the agent after a `/compact` or session reload."},{"id":"SC-002","text":"100% of findings captured in any test run conform to the declared section schema (correct section assignment and all required metadata fields present)."},{"id":"SC-003","text":"The scratchpad is successfully read by the agent at session start in 100% of test runs where the file exists, and a missing file results in a clean cold start in 100% of runs where it does not."},{"id":"SC-004","text":"The declared size cap is never exceeded without a rotation event being emitted — across all test runs, no observation of an active scratchpad larger than the cap."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"016-human-handoff":{"board":{"todo":[{"id":"US1","title":"Escalation suspends chat and emits schema-valid payload","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Schema rejects prose-only handoff (anti-pattern defense)","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Adding a required field propagates across escalations","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Escalation suspends chat and emits schema-valid payload","priority":"P1","scenarioCount":2,"body":"A practitioner exercises the agent against a scenario designed to trip an escalation precondition (for example, a refund request that exceeds a configured financial limit, or an aggressive customer demand flagged by policy). When the precondition fires, the agent MUST suspend conversational text generation, invoke the `escalate_to_human` tool, and emit a strictly typed JSON handoff payload that a downstream operator queue can consume without reading the raw transcript.\n\n**Why this priority**: This is the core value of the kata. Without suspension-plus-structured-payload, the Human-in-the-Loop transition (Constitution Principle VI) is not actually enforced — the agent keeps chatting and the operator is left triaging prose. P1 delivers a standalone, demonstrable MVP of the handoff contract.\n\n**Independent Test**: Trigger a crafted scenario that violates the configured policy limit. Confirm (a) no further conversational prose is emitted after the trigger, (b) a single `escalate_to_human` invocation is recorded, and (c) its payload validates against the declared handoff schema with all required fields populated.\n\n**Acceptance Scenarios**:\n\n1. **Given** a configured escalation precondition (operation exceeds financial limit), **When** the practitioner submits a request that crosses the limit, **Then** the agent suspends further conversational output and emits a schema-valid handoff payload containing `customer_id`, `issue_summary`, `actions_taken`, and `escalation_reason`.\n2. **Given** an aggressive customer demand flagged by policy, **When** the policy classifier fires, **Then** the agent invokes `escalate_to_human` exactly once and the payload is routed to the operator queue with a traceable escalation id.","clarificationCount":0},{"id":"US2","title":"Schema rejects prose-only handoff (anti-pattern defense)","priority":"P2","scenarioCount":2,"body":"A practitioner attempts to coax the agent into producing a prose-only handoff — a free-text narrative rather than the declared structured payload — or into dumping the entire unedited chat transcript as the handoff artifact. The schema layer MUST reject the attempt and force the agent back onto the structured contract.\n\n**Why this priority**: Defending the anti-pattern (raw-transcript dumping or prose-only handoff) is what makes the protocol trustworthy. Without this, the P1 story degrades into \"sometimes structured, sometimes a wall of text.\" P2 guarantees the boundary (Constitution Principle II — Schema-Enforced Boundaries).\n\n**Independent Test**: Issue an escalation under a prompt that explicitly requests prose output or \"just paste the transcript.\" Confirm the schema validator rejects the malformed output and either retries into a valid payload or surfaces a deterministic validation error — never a successful prose handoff.\n\n**Acceptance Scenarios**:\n\n1. **Given** an escalation trigger fires, **When** the agent produces an output lacking one or more required handoff fields, **Then** the schema validator rejects the output and no handoff is delivered to the operator queue.\n2. **Given** a practitioner prompt requesting a raw-transcript handoff, **When** the escalation is processed, **Then** the system MUST NOT deliver the raw transcript as the handoff artifact and MUST emit a structured payload or a validation failure.","clarificationCount":0},{"id":"US3","title":"Adding a required field propagates across escalations","priority":"P3","scenarioCount":2,"body":"A practitioner extends the handoff schema with a new required field (for example, `severity`). Every subsequent escalation MUST include that field; any escalation that omits it MUST be rejected by the schema layer, without code changes to the agent's prompt logic.\n\n**Why this priority**: Evolvability matters once the protocol is live. Operators will ask for new fields over time (severity, SLA clock, affected region). P3 proves the contract is the source of truth, not hard-coded prompt text.\n\n**Independent Test**: Add `severity` as required in the schema. Re-run the P1 scenario and confirm payloads without `severity` fail validation, and payloads with a valid `severity` value pass.\n\n**Acceptance Scenarios**:\n\n1. **Given** the handoff schema is updated to require `severity`, **When** an escalation fires, **Then** the resulting payload MUST include a valid `severity` value or be rejected by the validator.\n2. **Given** a legacy escalation path that does not emit `severity`, **When** it attempts to hand off, **Then** the system MUST surface a schema validation failure rather than silently delivering an incomplete payload.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST detect a configured escalation precondition (e.g., operation exceeds a declared financial limit, or a policy classifier flags aggressive customer demand) and trigger the handoff path."},{"id":"FR-002","text":"Upon trigger, the agent MUST suspend further conversational text generation for the remainder of that turn."},{"id":"FR-003","text":"The agent MUST invoke a single `escalate_to_human` tool call whose arguments conform to the declared handoff schema."},{"id":"FR-004","text":"The handoff payload MUST include, at minimum, the fields `customer_id`, `issue_summary`, `actions_taken`, and `escalation_reason`."},{"id":"FR-005","text":"`actions_taken` MUST be a structured list of prior steps the agent performed in the session (not free-form prose)."},{"id":"FR-006","text":"The system MUST reject any escalation output that fails schema validation and MUST NOT deliver it to the operator queue."},{"id":"FR-007","text":"The system MUST NOT deliver a raw, unedited chat transcript as the handoff artifact (anti-pattern defense)."},{"id":"FR-008","text":"The system MUST NOT deliver a prose-only handoff; structured fields are the contract."},{"id":"FR-009","text":"The system MUST log each escalation event with a unique traceable id that is persisted in the audit log and referenced in the payload."},{"id":"FR-010","text":"When the declared handoff schema is extended with a new required field, subsequent escalations MUST be validated against the updated schema without changes to agent prompt logic."},{"id":"FR-011","text":"The system MUST handle repeated escalations in a single session as distinct events, each with its own traceable id."},{"id":"FR-012","text":"The documentation MUST describe the escalation preconditions, the handoff schema, and the anti-pattern being defended (per Constitution Principle VIII)."}],"successCriteria":[{"id":"SC-001","text":"100% of escalations produce schema-valid payloads (zero escalations delivered to the operator queue without passing validation)."},{"id":"SC-002","text":"0 raw-transcript-only handoffs observed in the operator queue across the evaluation run."},{"id":"SC-003","text":"Human resolution time on escalated cases is lower than the transcript-based baseline by a declared delta (target delta established during plan phase; measured over a representative sample)."},{"id":"SC-004","text":"Every escalation id is traceable end-to-end in the audit log, linking session, precondition, payload, and operator-queue delivery."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"},{"from":"US3","to":"FR-011"},{"from":"US3","to":"FR-012"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (repo baseline — Kata 1 plan §Technical Context)."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — `escalate_to_human` is registered as a"},{"label":"Storage","value":"Local filesystem only."},{"label":"Testing","value":"- pytest + pytest-bdd for acceptance scenarios mapped from US1/US2/US3 and"},{"label":"Target Platform","value":"Developer local (macOS/Linux) and GitHub Actions CI"},{"label":"Project Type","value":"Single project — one kata module at"},{"label":"Performance Goals","value":"Not latency-bound. Acceptance suite against recorded"},{"label":"Constraints","value":"- **Zero bytes** of conversational text after suspension — enforced by a"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/016-human-handoff","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST detect a configured escalation precondition (e.g., operation exceeds a declared financial limit, or a policy classifier flags aggressive customer demand) and trigger the handoff path."},{"id":"FR-002","text":"Upon trigger, the agent MUST suspend further conversational text generation for the remainder of that turn."},{"id":"FR-003","text":"The agent MUST invoke a single `escalate_to_human` tool call whose arguments conform to the declared handoff schema."},{"id":"FR-004","text":"The handoff payload MUST include, at minimum, the fields `customer_id`, `issue_summary`, `actions_taken`, and `escalation_reason`."},{"id":"FR-005","text":"`actions_taken` MUST be a structured list of prior steps the agent performed in the session (not free-form prose)."},{"id":"FR-006","text":"The system MUST reject any escalation output that fails schema validation and MUST NOT deliver it to the operator queue."},{"id":"FR-007","text":"The system MUST NOT deliver a raw, unedited chat transcript as the handoff artifact (anti-pattern defense)."},{"id":"FR-008","text":"The system MUST NOT deliver a prose-only handoff; structured fields are the contract."},{"id":"FR-009","text":"The system MUST log each escalation event with a unique traceable id that is persisted in the audit log and referenced in the payload."},{"id":"FR-010","text":"When the declared handoff schema is extended with a new required field, subsequent escalations MUST be validated against the updated schema without changes to agent prompt logic."},{"id":"FR-011","text":"The system MUST handle repeated escalations in a single session as distinct events, each with its own traceable id."},{"id":"FR-012","text":"The documentation MUST describe the escalation preconditions, the handoff schema, and the anti-pattern being defended (per Constitution Principle VIII)."},{"id":"SC-001","text":"100% of escalations produce schema-valid payloads (zero escalations delivered to the operator queue without passing validation)."},{"id":"SC-002","text":"0 raw-transcript-only handoffs observed in the operator queue across the evaluation run."},{"id":"SC-003","text":"Human resolution time on escalated cases is lower than the transcript-based baseline by a declared delta (target delta established during plan phase; measured over a representative sample)."},{"id":"SC-004","text":"Every escalation id is traceable end-to-end in the audit log, linking session, precondition, payload, and operator-queue delivery."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","FR-011","FR-012","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"017-batch-processing":{"board":{"todo":[{"id":"US1","title":"Classify and submit an async-tolerant workload via the batch API","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Demonstrate cost reduction vs. synchronous baseline","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Isolate, fragment, and reprocess failing items","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Classify and submit an async-tolerant workload via the batch API","priority":"P1","scenarioCount":3,"body":"A practitioner inspects an incoming workload (thousands of documents from a nightly/weekly audit), determines that it is not user-facing and tolerates a multi-hour turnaround, assigns a unique `custom_id` to each item, submits the collection as a single asynchronous batch job, and later receives the results with every response reunited with its original source via the same `custom_id`.\n\n**Why this priority**: This is the core MVP. Without the classify-and-submit path plus correlation, there is no batch-processing feature at all — every downstream story assumes a batch has been submitted and its results can be mapped back.\n\n**Independent Test**: Can be fully tested by feeding a corpus of offline audit items, classifying the workload as async-tolerant, submitting it as a single batch with `custom_id`s, and verifying that the returned responses can be 100% correlated back to their source items.\n\n**Acceptance Scenarios**:\n\n1. **Given** a corpus of offline audit documents declared as non-user-facing and tolerating a multi-hour turnaround, **When** the practitioner classifies the workload and submits it through the batch pathway, **Then** the system produces a single batch job containing every item, each carrying a unique `custom_id`.\n2. **Given** a submitted batch job that has completed within its declared window, **When** the practitioner retrieves the results, **Then** every response is paired back to its originating source item through the matching `custom_id` with no ambiguity.\n3. **Given** a workload flagged as blocking (user-facing chat), **When** the practitioner runs classification, **Then** the system refuses to route it through the batch pathway and directs it to the synchronous pathway instead.","clarificationCount":0},{"id":"US2","title":"Demonstrate cost reduction vs. synchronous baseline","priority":"P2","scenarioCount":2,"body":"A practitioner runs the same offline audit corpus twice — once through the synchronous pathway and once through the batch pathway — and confirms that the batch pathway achieves the declared cost-reduction target, defending against the anti-pattern of paying full synchronous rate for latency-tolerant work.\n\n**Why this priority**: The economic justification is the reason the feature exists. Without a measured comparison, the practitioner cannot prove the anti-pattern has been neutralized.\n\n**Independent Test**: Can be fully tested by processing an identical corpus through both pathways, recording per-request cost, and asserting that the batch-pathway total cost is at least the target percentage lower than the synchronous baseline.\n\n**Acceptance Scenarios**:\n\n1. **Given** an identical corpus processed through both the synchronous pathway and the batch pathway, **When** totals are compared, **Then** the batch-pathway total cost is lower than the synchronous total by at least the declared target percentage.\n2. **Given** a workload that was mistakenly processed synchronously despite being async-tolerant, **When** the comparison report is produced, **Then** the report explicitly flags the missed-savings anti-pattern and quantifies the avoidable spend.","clarificationCount":0},{"id":"US3","title":"Isolate, fragment, and reprocess failing items","priority":"P3","scenarioCount":3,"body":"A practitioner injects items that will deliberately fail (e.g. inputs that exceed the context limit) into a batch; the system isolates those `custom_id`s into a failure bucket, fragments their source data into smaller pieces, and reprocesses only the failing subset without re-running the whole batch.\n\n**Why this priority**: Partial-failure recovery hardens the feature for real-world corpora but is not required to prove the core value. It builds on P1 and P2.\n\n**Independent Test**: Can be fully tested by submitting a batch that contains a known-failing minority of items, verifying that successful items are retained, that only the failing `custom_id`s are collected into a failure bucket, that their source data is fragmented, and that a follow-up batch processes only those fragments.\n\n**Acceptance Scenarios**:\n\n1. **Given** a completed batch in which a minority of items failed (e.g. context-limit errors), **When** the practitioner triggers recovery, **Then** only the failing `custom_id`s are collected into a failure bucket and successful items are left untouched.\n2. **Given** items in the failure bucket, **When** recovery runs, **Then** each failing source is fragmented into smaller pieces and a new batch is submitted containing only those fragments.\n3. **Given** the reprocessing batch completes, **When** results are merged back, **Then** fragment responses are stitched to their original source `custom_id` and the corpus ends in a fully resolved state.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST classify each incoming workload as either batchable (async-tolerant, non-user-facing) or synchronous (blocking, user-facing) according to declared criteria before any submission decision is made."},{"id":"FR-002","text":"System MUST assign a unique `custom_id` to every item included in a batch submission."},{"id":"FR-003","text":"System MUST map every returned response back to its originating source item via the same `custom_id` used at submission."},{"id":"FR-004","text":"System MUST isolate items that failed within a batch into a dedicated failure bucket keyed by `custom_id`, without discarding successful items."},{"id":"FR-005","text":"System MUST support fragmenting a failing source item into smaller pieces and resubmitting only those pieces as a follow-up batch."},{"id":"FR-006","text":"System MUST report the cost of a batch-pathway run against a synchronous baseline for the same workload and surface the percentage saved."},{"id":"FR-007","text":"System MUST NOT silently drop items — every submitted `custom_id` MUST be accounted for as succeeded, failed, or timed out."},{"id":"FR-008","text":"System MUST refuse to route a workload classified as blocking/user-facing through the batch pathway."},{"id":"FR-009","text":"System MUST reject batch submissions that contain duplicate `custom_id`s."},{"id":"FR-010","text":"System MUST surface an explicit terminal state when the declared batch turnaround window is exceeded."}],"successCriteria":[{"id":"SC-001","text":"Cost reduction of the batch-pathway run vs. the synchronous baseline for an identical corpus is greater than or equal to the declared target percentage (~50%)."},{"id":"SC-002","text":"100% of responses returned by a completed batch are correlated to a submitted `custom_id` (no orphaned responses, no unanswered sources)."},{"id":"SC-003","text":"0 items are silently dropped across the test corpus — every submitted `custom_id` terminates in an accounted state (succeeded, failed, or timed out)."},{"id":"SC-004","text":"Failed-item reprocessing via isolation and fragmentation converges (all items either succeed or are explicitly declared unrecoverable) within N rounds of re-submission for the test corpus."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — exclusive source of batch lifecycle signals."},{"label":"Storage","value":"Local filesystem only. Per-run artifacts under"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; pytest for units. Fixtures under"},{"label":"Target Platform","value":"Developer local (macOS/Linux) and GitHub Actions CI (Linux)."},{"label":"Project Type","value":"Single project. Kata module at"},{"label":"Performance Goals","value":"Not latency-bound. Acceptance suite against recorded"},{"label":"Constraints","value":"- Every `custom_id` submitted MUST terminate in an accounted state"},{"label":"Scale/Scope","value":"One kata, ~450–600 LOC implementation + comparable test code."}],"researchDecisions":[],"fileStructure":{"rootName":"specs/017-batch-processing","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST classify each incoming workload as either batchable (async-tolerant, non-user-facing) or synchronous (blocking, user-facing) according to declared criteria before any submission decision is made."},{"id":"FR-002","text":"System MUST assign a unique `custom_id` to every item included in a batch submission."},{"id":"FR-003","text":"System MUST map every returned response back to its originating source item via the same `custom_id` used at submission."},{"id":"FR-004","text":"System MUST isolate items that failed within a batch into a dedicated failure bucket keyed by `custom_id`, without discarding successful items."},{"id":"FR-005","text":"System MUST support fragmenting a failing source item into smaller pieces and resubmitting only those pieces as a follow-up batch."},{"id":"FR-006","text":"System MUST report the cost of a batch-pathway run against a synchronous baseline for the same workload and surface the percentage saved."},{"id":"FR-007","text":"System MUST NOT silently drop items — every submitted `custom_id` MUST be accounted for as succeeded, failed, or timed out."},{"id":"FR-008","text":"System MUST refuse to route a workload classified as blocking/user-facing through the batch pathway."},{"id":"FR-009","text":"System MUST reject batch submissions that contain duplicate `custom_id`s."},{"id":"FR-010","text":"System MUST surface an explicit terminal state when the declared batch turnaround window is exceeded."},{"id":"SC-001","text":"Cost reduction of the batch-pathway run vs. the synchronous baseline for an identical corpus is greater than or equal to the declared target percentage (~50%)."},{"id":"SC-002","text":"100% of responses returned by a completed batch are correlated to a submitted `custom_id` (no orphaned responses, no unanswered sources)."},{"id":"SC-003","text":"0 items are silently dropped across the test corpus — every submitted `custom_id` terminates in an accounted state (succeeded, failed, or timed out)."},{"id":"SC-004","text":"Failed-item reprocessing via isolation and fragmentation converges (all items either succeed or are explicitly declared unrecoverable) within N rounds of re-submission for the test corpus."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"015-self-correction":{"board":{"todo":[{"id":"US1","title":"Consistent Invoice Passes Cross-Audit","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Conflicting Invoice Routes to Human Review","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Neither Total Is Ever Silently Overwritten","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Consistent Invoice Passes Cross-Audit","priority":"P1","scenarioCount":3,"body":"A practitioner submits an invoice whose stated total matches the arithmetic sum of its line items. The extraction produces both the literal `stated_total` read from the document and the independently `calculated_total` derived by summing line items, and reports that no conflict was detected. The practitioner gains confidence that the pipeline is actually performing the recomputation (not just echoing the stated figure back) because both values are surfaced separately and agree.\n\n**Why this priority**: This is the happy-path backbone of the self-correction mechanism. Without it, neither the conflict-detection nor the human-review paths can be trusted. It also establishes the schema shape that Stories 2 and 3 depend on.\n\n**Independent Test**: Can be fully tested by feeding a known-consistent invoice into the extractor and asserting that `stated_total`, `calculated_total`, and `conflict_detected=false` are all emitted, with both totals numerically equal within the declared tolerance.\n\n**Acceptance Scenarios**:\n\n1. **Given** an invoice whose line items sum exactly to the stated total, **When** the extractor runs, **Then** it emits `stated_total` matching the document's literal value, `calculated_total` equal to the sum of line items, and `conflict_detected=false`.\n2. **Given** an invoice with rounding differences within the declared tolerance, **When** the extractor runs, **Then** both totals are emitted verbatim (neither overwritten) and `conflict_detected=false`.\n3. **Given** the extraction succeeds, **When** the output is inspected, **Then** a per-line-item calculation trace is attached for audit.","clarificationCount":0},{"id":"US2","title":"Conflicting Invoice Routes to Human Review","priority":"P2","scenarioCount":3,"body":"A practitioner submits an invoice whose line items sum to a value different from the stated total (for example, a missing line, a transcription error, or a fraudulent alteration). The extractor detects the mismatch, sets `conflict_detected=true`, preserves BOTH totals exactly as produced, and routes the record to a human-review queue instead of returning a \"clean\" extraction. This is the primary anti-pattern defense: the system refuses to silently trust either number.\n\n**Why this priority**: This is the core value proposition of the kata. It converts a silent hallucination-prone pipeline into one that fails loudly and safely.\n\n**Independent Test**: Can be fully tested by feeding a curated invoice where the stated total disagrees with the line-item sum beyond tolerance, and asserting that `conflict_detected=true`, both totals remain unchanged, and the record appears in the human-review queue.\n\n**Acceptance Scenarios**:\n\n1. **Given** an invoice whose stated total disagrees with the line-item sum beyond the declared tolerance, **When** the extractor runs, **Then** `conflict_detected=true` is emitted and the record is routed to the human-review queue.\n2. **Given** a conflict is detected, **When** the output is inspected, **Then** `stated_total` and `calculated_total` are both present and neither has been replaced by the other.\n3. **Given** a conflict is detected, **When** downstream consumers read the record, **Then** they receive the full line-item calculation trace so a reviewer can pinpoint the discrepancy.","clarificationCount":0},{"id":"US3","title":"Neither Total Is Ever Silently Overwritten","priority":"P3","scenarioCount":3,"body":"A practitioner auditing the pipeline needs to guarantee that the extractor never \"helpfully\" replaces the stated total with the calculated one (or vice versa) under any input condition — consistent, conflicting, rounding-only, or degenerate. Both values must travel through the system as independent fields so that a reviewer can always reconstruct what the document said and what the model computed.\n\n**Why this priority**: This closes the second half of the anti-pattern — silently overwriting one total with the other would defeat the audit trail even when `conflict_detected` is correctly set. It is P3 because it is enforced primarily through schema and invariant checks rather than new user-facing behavior.\n\n**Independent Test**: Can be fully tested by replaying a corpus of invoices (consistent, conflicting, rounding-only, degenerate) and asserting for every record that `stated_total` equals the literal document value and `calculated_total` equals the recomputed sum, with zero cases of one field being substituted by the other.\n\n**Acceptance Scenarios**:\n\n1. **Given** any invoice in the test corpus, **When** the extractor runs, **Then** `stated_total` always reflects the literal document value and `calculated_total` always reflects the independent recomputation.\n2. **Given** a conflict is detected, **When** the record is persisted, **Then** no post-processing step collapses the two fields into one.\n3. **Given** a consistent invoice, **When** the record is persisted, **Then** the two fields are still emitted as distinct values even though they agree.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST emit both `stated_total` (the literal total as written in the source document) and `calculated_total` (the independently recomputed sum of line items) as distinct fields on every extraction output."},{"id":"FR-002","text":"System MUST iteratively extract each line item and sum the line-item amounts to produce `calculated_total`, independent of `stated_total`."},{"id":"FR-003","text":"System MUST include a boolean `conflict_detected` field in the extraction schema on every output."},{"id":"FR-004","text":"System MUST set `conflict_detected=true` whenever `stated_total` and `calculated_total` disagree beyond a declared, documented tolerance, and `conflict_detected=false` otherwise."},{"id":"FR-005","text":"System MUST route every record with `conflict_detected=true` to a human-review queue and MUST NOT return it as a clean extraction to downstream consumers."},{"id":"FR-006","text":"System MUST NEVER silently replace `stated_total` with `calculated_total`, nor `calculated_total` with `stated_total`, under any condition (anti-pattern defense)."},{"id":"FR-007","text":"System MUST log a per-line-item calculation trace (each line's extracted amount and its contribution to the running sum) on every extraction, to satisfy Provenance & Self-Audit."},{"id":"FR-008","text":"System MUST declare and persist the tolerance value used for the conflict comparison alongside the extraction output."},{"id":"FR-009","text":"System MUST emit a machine-readable schema-conformant record; any extraction that cannot populate both totals MUST be flagged as a conflict rather than returned with null coerced to zero."},{"id":"FR-010","text":"System MUST preserve the sign of credit / refund / discount line items when computing `calculated_total`."}],"successCriteria":[{"id":"SC-001","text":"`conflict_detected` accuracy is greater than or equal to the target threshold on the labeled test set (both true-positive and true-negative rates measured independently against curated consistent and conflicting invoices)."},{"id":"SC-002","text":"Zero silent overwrites across the test corpus — for every record, `stated_total` equals the literal document value and `calculated_total` equals the independent recomputation, with no case of one field being substituted by the other."},{"id":"SC-003","text":"100% of conflicts produce a traceable line-item calculation log sufficient for a human reviewer to locate the discrepancy without re-running the extraction."},{"id":"SC-004","text":"The human-review queue receives every record flagged with `conflict_detected=true`, with zero flagged records leaking to downstream \"clean\" consumers."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — sole structured-extraction surface"},{"label":"Storage","value":"Local filesystem only. Two append-only JSONL streams per run:"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance scenarios; plain pytest for"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — kata module at"},{"label":"Performance Goals","value":"Not latency-bound. The long-invoice fixture"},{"label":"Constraints","value":"- ALL money fields MUST be `Decimal`. Any `float` in a money path is a lint"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/015-self-correction","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST emit both `stated_total` (the literal total as written in the source document) and `calculated_total` (the independently recomputed sum of line items) as distinct fields on every extraction output."},{"id":"FR-002","text":"System MUST iteratively extract each line item and sum the line-item amounts to produce `calculated_total`, independent of `stated_total`."},{"id":"FR-003","text":"System MUST include a boolean `conflict_detected` field in the extraction schema on every output."},{"id":"FR-004","text":"System MUST set `conflict_detected=true` whenever `stated_total` and `calculated_total` disagree beyond a declared, documented tolerance, and `conflict_detected=false` otherwise."},{"id":"FR-005","text":"System MUST route every record with `conflict_detected=true` to a human-review queue and MUST NOT return it as a clean extraction to downstream consumers."},{"id":"FR-006","text":"System MUST NEVER silently replace `stated_total` with `calculated_total`, nor `calculated_total` with `stated_total`, under any condition (anti-pattern defense)."},{"id":"FR-007","text":"System MUST log a per-line-item calculation trace (each line's extracted amount and its contribution to the running sum) on every extraction, to satisfy Provenance & Self-Audit."},{"id":"FR-008","text":"System MUST declare and persist the tolerance value used for the conflict comparison alongside the extraction output."},{"id":"FR-009","text":"System MUST emit a machine-readable schema-conformant record; any extraction that cannot populate both totals MUST be flagged as a conflict rather than returned with null coerced to zero."},{"id":"FR-010","text":"System MUST preserve the sign of credit / refund / discount line items when computing `calculated_total`."},{"id":"SC-001","text":"`conflict_detected` accuracy is greater than or equal to the target threshold on the labeled test set (both true-positive and true-negative rates measured independently against curated consistent and conflicting invoices)."},{"id":"SC-002","text":"Zero silent overwrites across the test corpus — for every record, `stated_total` equals the literal document value and `calculated_total` equals the independent recomputation, with no case of one field being substituted by the other."},{"id":"SC-003","text":"100% of conflicts produce a traceable line-item calculation log sufficient for a human reviewer to locate the discrepancy without re-running the extraction."},{"id":"SC-004","text":"The human-review queue receives every record flagged with `conflict_detected=true`, with zero flagged records leaking to downstream \"clean\" consumers."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"014-few-shot-calibration":{"board":{"todo":[{"id":"US1","title":"Zero-Shot Baseline vs. Calibrated Few-Shot on an Edge-Case Corpus","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Demonstrate the Anti-Pattern and Measure the Delta","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Rotate the Example Set and Observe Sensitivity","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Zero-Shot Baseline vs. Calibrated Few-Shot on an Edge-Case Corpus","priority":"P1","scenarioCount":3,"body":"A practitioner curates a corpus of edge-case inputs for a highly subjective task (for example, interpreting informal culinary measures such as \"a pinch of salt\"). They first run the task on the corpus in zero-shot mode and record the failure/inconsistency rate. They then add 2–4 explicit structured input/output example pairs to the prompt and re-run the same corpus. They observe and record a significant improvement in format conformance and consistency.\n\n**Why this priority**: This is the core loop of the kata — without a measured before/after on the same corpus, \"calibration\" is an anecdote rather than an engineering technique. It is also the smallest slice that delivers standalone value: one corpus, one prompt change, one measured improvement.\n\n**Independent Test**: Can be fully tested by running the edge-case corpus once zero-shot, recording the inconsistency rate, running it again with a calibrated example set, and confirming the recorded delta meets the declared threshold.\n\n**Acceptance Scenarios**:\n\n1. **Given** an
