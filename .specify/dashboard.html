strings (e.g., \"Operation failed\") are"},{"id":"SC-003","text":"Retryable failures resolve within the configured retry budget"},{"id":"SC-004","text":"100% of non-retryable failures route to the policy-defined"}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (repo baseline — Kata 1 `plan.md` §Technical Context)."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — drives the agent loop that consumes"},{"label":"Storage","value":"Local filesystem only. Structured error log is append-only JSONL"},{"label":"Testing","value":"- pytest + pytest-bdd for acceptance scenarios mapped from User Stories 1–3."},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) + GitHub Actions CI."},{"label":"Project Type","value":"Single project — sibling package under"},{"label":"Performance Goals","value":"Not latency-bound. Fixture acceptance run completes"},{"label":"Constraints","value":"- No generic failure strings may cross the MCP response boundary — enforced"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/006-mcp-errors","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The system MUST flag every failed MCP tool invocation with"},{"id":"FR-002","text":"The system MUST include, on every failure response, an"},{"id":"FR-003","text":"The system MUST NOT emit generic failure strings (e.g.,"},{"id":"FR-004","text":"The agent MUST branch its behavior on the structured metadata:"},{"id":"FR-005","text":"The system MUST enforce a configurable retry budget per tool"},{"id":"FR-006","text":"The system MUST log every structured error with full metadata"},{"id":"FR-007","text":"When the MCP response is missing required structured fields or"},{"id":"FR-008","text":"The system MUST keep escalation policy (who or what receives a"},{"id":"SC-001","text":"100% of observed tool failures in a workshop run carry both an"},{"id":"SC-002","text":"0 generic failure strings (e.g., \"Operation failed\") are"},{"id":"SC-003","text":"Retryable failures resolve within the configured retry budget"},{"id":"SC-004","text":"100% of non-retryable failures route to the policy-defined"}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"008-claude-md-memory":{"board":{"todo":[{"id":"US1","title":"Zero-Setup Team Conventions on Fresh Clone","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Team Rules Win Over Personal Preferences on Project Tasks","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Editing a Referenced Manual Updates Agent Behavior Without Touching CLAUDE.md","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Zero-Setup Team Conventions on Fresh Clone","priority":"P1","scenarioCount":2,"body":"A practitioner clones the repository for the first time and starts an agent session. The agent automatically loads the repo-level memory file (`.claude/CLAUDE.md` or root-level `CLAUDE.md`) and adopts the team's coding conventions without any manual configuration, environment variables, or per-user setup steps.\n\n**Why this priority**: This is the core value of hierarchical memory — team conventions must travel with the code so every contributor (and every agent) starts from the same baseline. Without this, the feature delivers no team-level value.\n\n**Independent Test**: Delete the working copy, re-clone the repository into a clean directory, start an agent session, and ask the agent to perform a task governed by a team convention (e.g., \"use pnpm instead of npm\"). The agent must follow the convention without being reminded.\n\n**Acceptance Scenarios**:\n\n1. **Given** a fresh clone of the repository and no user-level memory overriding team rules, **When** the practitioner starts an agent session in the repo root, **Then** the agent loads the project memory file and treats its contents as authoritative for project work.\n2. **Given** a project memory file that references an external manual via `@./standards/coding-style.md`, **When** the agent starts up, **Then** the referenced manual's content is resolved and available to the agent without the practitioner opening it manually.","clarificationCount":0},{"id":"US2","title":"Team Rules Win Over Personal Preferences on Project Tasks","priority":"P2","scenarioCount":2,"body":"A practitioner keeps personal preferences (preferred language, formatting quirks, shortcuts) in `~/.claude/CLAUDE.md`. When those personal preferences conflict with a team convention declared in the repo's project memory, the agent follows the team convention while working inside the project. This is the explicit anti-pattern defense: personal-scope files must NOT pollute team behavior.\n\n**Why this priority**: Without precedence rules, a single developer's personal file can silently alter how the agent behaves on shared code, producing inconsistent output across the team. P2 because P1 must exist before precedence is meaningful.\n\n**Independent Test**: Add a personal rule to `~/.claude/CLAUDE.md` that contradicts a team rule in `.claude/CLAUDE.md` (e.g., personal says \"use tabs\", team says \"use spaces\"). Ask the agent to produce code in the project. The output must honor the team rule.\n\n**Acceptance Scenarios**:\n\n1. **Given** a team rule \"use pnpm\" in project memory and a personal rule \"use npm\" in user memory, **When** the agent performs a project task requiring a package manager, **Then** the agent uses pnpm.\n2. **Given** a personal preference that does not conflict with any team rule, **When** the agent performs a task where only the personal preference applies, **Then** the personal preference is respected.","clarificationCount":0},{"id":"US3","title":"Editing a Referenced Manual Updates Agent Behavior Without Touching CLAUDE.md","priority":"P3","scenarioCount":2,"body":"A practitioner edits an external manual referenced from the project memory file (e.g., `@./standards/coding-style.md`). The next agent session reflects the updated manual without any edit to `CLAUDE.md` itself. This validates that the modular `@path` structure is a live reference, not a snapshot.\n\n**Why this priority**: Modularity is the practical win — it keeps the top-level memory file small and lets domain manuals evolve independently. P3 because P1 and P2 establish the loading and precedence behavior that this story depends on.\n\n**Independent Test**: Edit `./standards/coding-style.md` to add a new rule. Start a fresh agent session. Ask the agent to perform a task governed by the new rule. The new rule is honored without any change to `CLAUDE.md`.\n\n**Acceptance Scenarios**:\n\n1. **Given** a project memory file containing `@./standards/coding-style.md` and an updated version of that manual, **When** the agent starts a new session, **Then** the new rules take effect.\n2. **Given** an `@path` reference is removed from `CLAUDE.md`, **When** the agent starts a new session, **Then** rules that only lived in the dereferenced manual no longer apply.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST load project-level memory from a repo-committed file (`.claude/CLAUDE.md` or repo-root `CLAUDE.md`) at agent startup without any per-user configuration."},{"id":"FR-002","text":"System MUST support `@path` references from the project memory file to external manuals (e.g., `@./standards/coding-style.md`) and resolve their contents as part of the effective memory."},{"id":"FR-003","text":"System MUST keep personal memory separate and user-scoped at `~/.claude/CLAUDE.md` so that personal rules do not enter version control or alter teammates' agent behavior."},{"id":"FR-004","text":"System MUST fail loud with an explicit diagnostic when an `@path` target is missing, unreadable, or produces a resolution cycle — silent degradation is prohibited."},{"id":"FR-005","text":"System MUST make effective memory deterministic across fresh clones — given the same commit SHA, every developer's agent loads the same project rules in the same resolution order."},{"id":"FR-006","text":"System MUST define and document a memory resolution order in which project-level rules take precedence over personal rules for project tasks."},{"id":"FR-007","text":"System MUST keep the top-level `CLAUDE.md` within a declared size budget, relying on `@path` modularization rather than inline bloat."}],"successCriteria":[{"id":"SC-001","text":"A fresh clone yields identical agent behavior across developers — 100% reproducibility on a defined test prompt set, with no developer-specific drift attributable to memory loading."},{"id":"SC-002","text":"Personal rules never override declared team rules on project tasks — 0 conflicts pass through to agent output in the conflict test matrix."},{"id":"SC-003","text":"The modular `@path` structure keeps `CLAUDE.md` under a declared size budget (top-level file size measured and compared to the budget on every commit)."},{"id":"SC-004","text":"A missing `@path` target triggers an explicit diagnostic in 100% of cases — silent degradation is never observed in the failure test set."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (matches kata 001 baseline)."},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — used **only** by the fresh-clone"},{"label":"Storage","value":"Files on disk. No database. The validator reads committed memory"},{"label":"Testing","value":"pytest + pytest-bdd. Five fixture trees live under"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project. One kata module under"},{"label":"Performance Goals","value":"Not latency-bound. `MemoryResolver.resolve()` on the"},{"label":"Constraints","value":"- `TEAM_MEMORY_MAX_BYTES = 20 * 1024` — declared in the module; the lint test"},{"label":"Scale/Scope","value":"One kata, ~200–300 LOC resolver + comparable test code; one"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/008-claude-md-memory","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST load project-level memory from a repo-committed file (`.claude/CLAUDE.md` or repo-root `CLAUDE.md`) at agent startup without any per-user configuration."},{"id":"FR-002","text":"System MUST support `@path` references from the project memory file to external manuals (e.g., `@./standards/coding-style.md`) and resolve their contents as part of the effective memory."},{"id":"FR-003","text":"System MUST keep personal memory separate and user-scoped at `~/.claude/CLAUDE.md` so that personal rules do not enter version control or alter teammates' agent behavior."},{"id":"FR-004","text":"System MUST fail loud with an explicit diagnostic when an `@path` target is missing, unreadable, or produces a resolution cycle — silent degradation is prohibited."},{"id":"FR-005","text":"System MUST make effective memory deterministic across fresh clones — given the same commit SHA, every developer's agent loads the same project rules in the same resolution order."},{"id":"FR-006","text":"System MUST define and document a memory resolution order in which project-level rules take precedence over personal rules for project tasks."},{"id":"FR-007","text":"System MUST keep the top-level `CLAUDE.md` within a declared size budget, relying on `@path` modularization rather than inline bloat."},{"id":"SC-001","text":"A fresh clone yields identical agent behavior across developers — 100% reproducibility on a defined test prompt set, with no developer-specific drift attributable to memory loading."},{"id":"SC-002","text":"Personal rules never override declared team rules on project tasks — 0 conflicts pass through to agent output in the conflict test matrix."},{"id":"SC-003","text":"The modular `@path` structure keeps `CLAUDE.md` under a declared size budget (top-level file size measured and compared to the budget on every commit)."},{"id":"SC-004","text":"A missing `@path` target triggers an explicit diagnostic in 100% of cases — silent degradation is never observed in the failure test set."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"007-plan-mode":{"board":{"todo":[{"id":"US1","title":"Large Refactor Triggers a Read-Only Plan Document","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Direct Writes During Plan Mode Are Blocked","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Approved Plan Unlocks Direct Execution","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Large Refactor Triggers a Read-Only Plan Document","priority":"P1","scenarioCount":2,"body":"A practitioner issues an extensive refactor request (e.g., \"migrate auth from JWT to session cookies across 20 files\"). The agent recognizes the scope, enters Plan Mode, and uses only read, search, and glob capabilities to analyze the codebase. It compiles affected files, dependencies, risks, and a proposed migration sequence into a markdown plan document, then stops and requests human review.\n\n**Why this priority**: This is the primary defense against destructive modifications on unfamiliar codebases. Without a gating plan, the agent may apply broad, incorrect edits that are expensive to unwind. It directly operationalizes Constitution Principle VI (Human-in-the-Loop Escalation) for the highest-risk class of tasks.\n\n**Independent Test**: Submit a refactor request that touches multiple files. Verify that the agent produces a markdown plan document, performs zero write operations during the session, and explicitly waits for human approval before proceeding.\n\n**Acceptance Scenarios**:\n\n1. **Given** the agent receives a refactor request spanning multiple files, **When** the session begins, **Then** the agent enters Plan Mode and only invokes read/search/glob capabilities.\n2. **Given** the agent is in Plan Mode, **When** it finishes analysis, **Then** it produces a markdown plan document containing affected files, risks, and ordered migration steps, and halts pending human approval.","clarificationCount":0},{"id":"US2","title":"Direct Writes During Plan Mode Are Blocked","priority":"P2","scenarioCount":2,"body":"A practitioner (or an over-eager agent path) attempts to invoke a write, edit, or delete capability while the session is still in Plan Mode. The system blocks the attempt, records the event, and reminds the operator that a reviewed plan and explicit approval are required before Direct Execution.\n\n**Why this priority**: This story is the anti-pattern defense: it prevents jumping straight to edits on an unfamiliar codebase. Without enforcement, Plan Mode becomes advisory only and provides no real safety.\n\n**Independent Test**: Force the agent into Plan Mode, attempt a write/edit/delete tool call, and verify the call is blocked, no file is modified, and the block event is logged.\n\n**Acceptance Scenarios**:\n\n1. **Given** the session is in Plan Mode, **When** any write-class capability is invoked, **Then** the attempt is refused and no file on disk is modified.\n2. **Given** a blocked write attempt, **When** the refusal occurs, **Then** the event is logged with the attempted target and the current mode.","clarificationCount":0},{"id":"US3","title":"Approved Plan Unlocks Direct Execution","priority":"P3","scenarioCount":2,"body":"After reviewing the plan document, the practitioner approves it. The agent transitions to Direct Execution and applies the changes in the order described by the approved plan. If during execution the scope must change beyond the approved plan, the agent stops and requests a new approval.\n\n**Why this priority**: Enables the refactor to actually complete once safety has been established. It also closes the loop on traceability: every applied change maps back to an approved plan.\n\n**Independent Test**: Provide an approval signal after a plan has been produced, then verify the agent applies only the changes described in the plan and logs the Plan to Execute transition.\n\n**Acceptance Scenarios**:\n\n1. **Given** a plan document has been produced and approved, **When** the agent transitions to Direct Execution, **Then** it applies changes consistent with the approved plan and logs the transition.\n2. **Given** the agent is executing, **When** it detects a scope change not covered by the approved plan, **Then** it halts execution and requests a new approval.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST gate Direct Execution behind an explicit human approval of a Plan Document."},{"id":"FR-002","text":"System MUST prevent any write, edit, or delete capability from executing while the session is in Plan Mode."},{"id":"FR-003","text":"System MUST produce a markdown Plan Document covering at minimum: affected files, identified risks, and ordered migration steps."},{"id":"FR-004","text":"System MUST detect scope changes during Direct Execution and stop to request a new approval before continuing outside the approved plan."},{"id":"FR-005","text":"System MUST log every Plan-to-Execute transition, including the approved Plan Document identifier and the approving actor."},{"id":"FR-006","text":"System MUST allow read, search, and glob capabilities during Plan Mode to enable dependency analysis."},{"id":"FR-007","text":"System MUST record blocked write attempts occurring during Plan Mode with mode, target, and timestamp."}],"successCriteria":[{"id":"SC-001","text":"0 writes observed during Plan Mode across all runs of the test corpus."},{"id":"SC-002","text":"100% of executions are traceable to an approved Plan Document via logged Plan-to-Execute transitions."},{"id":"SC-003","text":"The Plan Document lists all affected files for every scenario in the tested corpus (completeness = 100%)."},{"id":"SC-004","text":"Scope-change detection rate equals 100% on the injected scope-creep test set, with the agent halting for re-approval in every case."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — the SDK's per-request `tools=[...]`"},{"label":"Storage","value":"Local filesystem only."},{"label":"Testing","value":"pytest + pytest-bdd for acceptance scenarios; plain pytest for"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — one kata module under"},{"label":"Performance Goals","value":"Not latency-bound. The fixture-driven acceptance suite"},{"label":"Constraints","value":"- Plan mode MUST NOT register write tools with the SDK. This is the"},{"label":"Scale/Scope","value":"One kata, ~500–700 LOC implementation + comparable test"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/007-plan-mode","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST gate Direct Execution behind an explicit human approval of a Plan Document."},{"id":"FR-002","text":"System MUST prevent any write, edit, or delete capability from executing while the session is in Plan Mode."},{"id":"FR-003","text":"System MUST produce a markdown Plan Document covering at minimum: affected files, identified risks, and ordered migration steps."},{"id":"FR-004","text":"System MUST detect scope changes during Direct Execution and stop to request a new approval before continuing outside the approved plan."},{"id":"FR-005","text":"System MUST log every Plan-to-Execute transition, including the approved Plan Document identifier and the approving actor."},{"id":"FR-006","text":"System MUST allow read, search, and glob capabilities during Plan Mode to enable dependency analysis."},{"id":"FR-007","text":"System MUST record blocked write attempts occurring during Plan Mode with mode, target, and timestamp."},{"id":"SC-001","text":"0 writes observed during Plan Mode across all runs of the test corpus."},{"id":"SC-002","text":"100% of executions are traceable to an approved Plan Document via logged Plan-to-Execute transitions."},{"id":"SC-003","text":"The Plan Document lists all affected files for every scenario in the tested corpus (completeness = 100%)."},{"id":"SC-004","text":"Scope-change detection rate equals 100% on the injected scope-creep test set, with the agent halting for re-approval in every case."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"005-defensive-extraction":{"board":{"todo":[{"id":"US1","title":"Well-Formed Source Produces Schema-Valid Record","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Missing Optional Fields Return Null, Not Fabrications","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Ambiguous Values Route to Escape Enum","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Well-Formed Source Produces Schema-Valid Record","priority":"P1","scenarioCount":3,"body":"A practitioner supplies an unstructured source document that contains every guaranteed field described by the extraction schema. The system invokes the model with a schema-bound extraction tool and a forced tool choice, and returns a typed object that conforms exactly to the declared schema.\n\n**Why this priority**: Without a working happy path that produces a schema-valid object, no downstream consumer can rely on the extractor at all. This is the minimum viable slice of the kata and proves that Constitutional Principle II (Schema-Enforced Boundaries) is satisfied for the baseline case.\n\n**Independent Test**: Feed the extractor a corpus item whose text contains every required field. Verify the returned record validates against the declared extraction schema, that no field outside the schema is present, and that the tool-call envelope was actually used (not free-form text).\n\n**Acceptance Scenarios**:\n\n1. **Given** a source document that contains every guaranteed field, **When** the practitioner runs extraction with the schema-bound tool and forced tool choice, **Then** the returned record validates against the extraction schema with zero validation errors.\n2. **Given** a source document with all required fields present, **When** the model is invoked, **Then** the model's response is delivered as a tool call (not a free-text message) and contains only keys declared by the schema.\n3. **Given** a valid extraction result, **When** it is passed to schema validation, **Then** every required field has a non-null value of the declared type.","clarificationCount":0},{"id":"US2","title":"Missing Optional Fields Return Null, Not Fabrications","priority":"P2","scenarioCount":3,"body":"A practitioner supplies a source document that omits one or more optional fields. The extractor returns those fields as `null` via nullable union types rather than inventing plausible-sounding values. This is the primary defense against the kata's first anti-pattern (marking every field as required).\n\n**Why this priority**: Fabrication is the highest-severity defect this feature exists to prevent. A feature that hallucinates optional fields is strictly worse than no feature at all, because downstream consumers trust the schema. This story operationalizes Constitutional Principle VII (Provenance & Self-Audit): absence must be representable.\n\n**Independent Test**: Curate a subset of the test corpus where selected optional fields are known to be absent from the source text. Run extraction and verify that every absent optional field arrives as `null`, and that no plausible-looking fabricated value is substituted.\n\n**Acceptance Scenarios**:\n\n1. **Given** a source document that omits an optional field, **When** extraction runs, **Then** that field is returned as `null` in the extracted record.\n2. **Given** a schema declaring an optional field as a nullable union, **When** the source lacks that information, **Then** the model returns `null` rather than a free-form guess or the string \"unknown\".\n3. **Given** an extraction result over a corpus of sources with known-absent optionals, **When** the batch completes, **Then** the null rate on those fields meets the success criterion and no fabricated values are observed.","clarificationCount":0},{"id":"US3","title":"Ambiguous Values Route to Escape Enum","priority":"P3","scenarioCount":3,"body":"A practitioner supplies a source document whose value for an enumerated field does not clearly match any enumerated option, or is contradicted elsewhere in the text. The extractor returns the escape option (`\"unclear\"` or `\"other\"`) for that field and populates the paired details field with the ambiguous raw value for downstream human review.\n\n**Why this priority**: Without an escape hatch, the model is forced to pick the nearest enum value, silently corrupting the data. This story closes the ambiguity gap that would otherwise masquerade as clean data, and makes the extraction output auditable per Constitutional Principle VII.\n\n**Independent Test**: Feed the extractor ambiguity fixtures (value outside the enumerated set, contradictory statements, mixed-language phrasing). Verify the enumerated field contains the declared escape option and the paired details field contains a non-empty string capturing what was actually seen.\n\n**Acceptance Scenarios**:\n\n1. **Given** a source whose enumerated value does not appear in the declared enum, **When** extraction runs, **Then** the field is set to `\"other\"` (or `\"unclear\"`) and the paired details field is populated.\n2. **Given** a source with contradictory statements about an enumerated field, **When** extraction runs, **Then** the escape option is selected and the details field captures the contradiction verbatim or summarized.\n3. **Given** an ambiguous corpus, **When** the batch completes, **Then** 100% of ambiguous cases are routed through the escape enum rather than being forced into a concrete category.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST declare a formal extraction schema for every extraction task, enumerating every permitted field, its type, and whether it is required or optional."},{"id":"FR-002","text":"The system MUST invoke the model with a schema-bound extraction tool and a forced tool choice that guarantees the model returns a tool call conforming to the schema (no free-text fallback)."},{"id":"FR-003","text":"The system MUST mark a field as `required` only when that field is guaranteed present in every source document of the target domain."},{"id":"FR-004","text":"The system MUST declare optional fields using a nullable union type so the model can explicitly return absence, and MUST NOT declare optional fields as plain string types."},{"id":"FR-005","text":"The system MUST provide an escape enumeration option (e.g., `\"other\"`, `\"unclear\"`) on every enumerated field, and MUST pair it with a details field capable of capturing the ambiguous raw value."},{"id":"FR-006","text":"The system MUST validate every model output against the declared extraction schema and MUST reject outputs that fail validation rather than silently coercing them."},{"id":"FR-007","text":"The system MUST NOT accept free-text \"best guess\" content for missing optional fields; any optional field without explicit evidence in the source MUST be `null`."},{"id":"FR-008","text":"The system MUST surface schema validation failures to the caller with sufficient context to audit which field failed and why (Principle VII, Provenance & Self-Audit)."},{"id":"FR-009","text":"The system MUST document, for each extraction schema, which fields are guaranteed vs. optional and what the escape option means (Principle VIII, Docs), so reviewers can verify the required/optional split is defensible."},{"id":"FR-010","text":"The system MUST refuse to emit fields outside the declared schema, even if the model attempts to return additional keys."}],"successCriteria":[{"id":"SC-001","text":"Zero fabricated values are observed across the full test corpus (no value in an extracted record lacks textual support in its source document)."},{"id":"SC-002","text":"100% of extraction outputs that reach the caller are schema-valid against their declared Extraction Schema."},{"id":"SC-003","text":"100% of ambiguous cases in the ambiguity fixture set are routed to the escape enum (with the paired details field populated) rather than forced into a concrete enumerated option."},{"id":"SC-004","text":"The null rate on absent optional fields is at least 99% across the test corpus (absent optionals are faithfully reported as `null` rather than fabricated)."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (required for `typing.Literal`, PEP 604 `X | None`"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — sole invocation path, required for"},{"label":"Storage","value":"Local filesystem only. Fixture corpus under"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for the schema"},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project — one kata module at"},{"label":"Performance Goals","value":"Not latency-bound. Offline fixture run completes in"},{"label":"Constraints","value":"- Every call to the Messages API from this kata MUST carry"},{"label":"Scale/Scope","value":"One kata, ~250–400 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/005-defensive-extraction","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The system MUST declare a formal extraction schema for every extraction task, enumerating every permitted field, its type, and whether it is required or optional."},{"id":"FR-002","text":"The system MUST invoke the model with a schema-bound extraction tool and a forced tool choice that guarantees the model returns a tool call conforming to the schema (no free-text fallback)."},{"id":"FR-003","text":"The system MUST mark a field as `required` only when that field is guaranteed present in every source document of the target domain."},{"id":"FR-004","text":"The system MUST declare optional fields using a nullable union type so the model can explicitly return absence, and MUST NOT declare optional fields as plain string types."},{"id":"FR-005","text":"The system MUST provide an escape enumeration option (e.g., `\"other\"`, `\"unclear\"`) on every enumerated field, and MUST pair it with a details field capable of capturing the ambiguous raw value."},{"id":"FR-006","text":"The system MUST validate every model output against the declared extraction schema and MUST reject outputs that fail validation rather than silently coercing them."},{"id":"FR-007","text":"The system MUST NOT accept free-text \"best guess\" content for missing optional fields; any optional field without explicit evidence in the source MUST be `null`."},{"id":"FR-008","text":"The system MUST surface schema validation failures to the caller with sufficient context to audit which field failed and why (Principle VII, Provenance & Self-Audit)."},{"id":"FR-009","text":"The system MUST document, for each extraction schema, which fields are guaranteed vs. optional and what the escape option means (Principle VIII, Docs), so reviewers can verify the required/optional split is defensible."},{"id":"FR-010","text":"The system MUST refuse to emit fields outside the declared schema, even if the model attempts to return additional keys."},{"id":"SC-001","text":"Zero fabricated values are observed across the full test corpus (no value in an extracted record lacks textual support in its source document)."},{"id":"SC-002","text":"100% of extraction outputs that reach the caller are schema-valid against their declared Extraction Schema."},{"id":"SC-003","text":"100% of ambiguous cases in the ambiguity fixture set are routed to the escape enum (with the paired details field populated) rather than forced into a concrete enumerated option."},{"id":"SC-004","text":"The null rate on absent optional fields is at least 99% across the test corpus (absent optionals are faithfully reported as `null` rather than fabricated)."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","FR-009","FR-010","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"004-subagent-isolation":{"board":{"todo":[{"id":"US1","title":"Scoped Fan-Out from Coordinator","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Leak-Probe Defense Against Shared-Memory Anti-Pattern","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Swappable Subagent via Typed Contract","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Scoped Fan-Out from Coordinator","priority":"P1","scenarioCount":2,"body":"A practitioner hands a decomposable, multi-part task to a coordinator agent. The coordinator breaks the task into independent subtasks, spawns one subagent per subtask, and hands each subagent only the narrow slice of information required to complete its step. Each subagent returns a structured, schema-conforming JSON payload that the coordinator recomposes into the final answer.\n\n**Why this priority**: This is the core hub-and-spoke pattern. Without scoped fan-out and a typed return contract, there is no isolation benefit — the feature does not exist. All other stories assume this baseline is in place.\n\n**Independent Test**: Can be fully tested by submitting a known decomposable task, inspecting the prompt handed to each subagent (to confirm it contains only the subtask slice), and validating each returned payload against the declared subagent output schema. Delivers a working coordinator-plus-subagent pipeline that completes a real task end-to-end.\n\n**Acceptance Scenarios**:\n\n1. **Given** a decomposable task and a coordinator configured with a task-spawning tool in its allowed tools, **When** the practitioner submits the task, **Then** the coordinator emits one scoped payload per subtask and each subagent receives only the fields declared in the Subtask Payload schema.\n2. **Given** a subagent has completed its subtask, **When** it returns control to the coordinator, **Then** the returned value is a JSON object that validates against the declared Subagent Result schema and the coordinator incorporates only the declared fields into its reasoning.","clarificationCount":0},{"id":"US2","title":"Leak-Probe Defense Against Shared-Memory Anti-Pattern","priority":"P2","scenarioCount":2,"body":"A practitioner deliberately plants a uniquely identifiable \"leak probe\" string inside the coordinator's private conversation history (e.g., an earlier user turn, a coordinator scratchpad note, or a tool result the coordinator saw). The practitioner then runs a normal decomposable task and verifies that the leak-probe string never appears in any subagent's input prompt, confirming that subagents do not silently inherit the coordinator's full memory.\n\n**Why this priority**: This story directly defends the stated anti-pattern (\"telepathy\" / inherited memory). It is the observable proof that isolation is real and not accidental. Without this check, isolation is merely asserted, not verified.\n\n**Independent Test**: Can be fully tested by seeding the coordinator's history with a probe token, running a decomposable task, and scanning every subagent input payload for the probe. A zero-occurrence count across all subagent inputs demonstrates the isolation boundary holds.\n\n**Acceptance Scenarios**:\n\n1. **Given** the coordinator's conversation history contains a unique leak-probe string that is not part of any subtask's declared payload, **When** the coordinator spawns subagents for a decomposable task, **Then** no subagent input contains the leak-probe string.\n2. **Given** the coordinator attempts to forward its raw conversation transcript as a subtask payload, **When** the handoff is evaluated against the Subtask Payload schema, **Then** the handoff is rejected as a schema violation before the subagent is invoked.","clarificationCount":0},{"id":"US3","title":"Swappable Subagent via Typed Contract","priority":"P3","scenarioCount":2,"body":"A practitioner replaces the implementation of one subagent with a different implementation (different reasoning strategy, different model, different internal prompt) while keeping the declared Handoff Contract unchanged. The coordinator continues to function without any modification, because it depends only on the typed contract, not on the subagent's internals.\n\n**Why this priority**: This story proves the architectural value of the typed contract beyond leak prevention — it enables evolution and substitution. It is P3 because the core isolation goal is already satisfied by P1 and P2; swappability is the compounding benefit on top.\n\n**Independent Test**: Can be fully tested by running a task end-to-end, swapping exactly one subagent implementation behind the same contract, rerunning the same task, and verifying identical coordinator behavior plus schema-valid final output. No coordinator code or prompt change is permitted during the swap.\n\n**Acceptance Scenarios**:\n\n1. **Given** a working coordinator and subagent set, **When** one subagent is swapped for a different implementation that honors the same Handoff Contract, **Then** the coordinator completes the task without any changes to its own configuration or prompt.\n2. **Given** a swapped subagent returns output that violates the Handoff Contract, **When** the coordinator receives the result, **Then** the coordinator surfaces a terminal schema-validation error rather than silently proceeding.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"System MUST limit each subagent's input to fields declared in a versioned Subtask Payload schema; any field not in the schema MUST NOT be transmitted."},{"id":"FR-002","text":"System MUST reject any implicit inheritance of the coordinator's conversation history, scratchpads, or tool-call transcripts into a subagent's input context."},{"id":"FR-003","text":"System MUST validate every subagent's output against a declared Subagent Result schema before the coordinator consumes any part of it."},{"id":"FR-004","text":"System MUST treat schema validation failures (input or output) as terminal errors with no silent fallback; retries are permitted only under an explicitly declared policy."},{"id":"FR-005","text":"System MUST log the exact payload handed to each subagent and the exact result received, in a form that an auditor can diff against the declared schemas."},{"id":"FR-006","text":"System MUST configure the coordinator with a task-spawning tool in its allowed tools list; subagents MUST NOT share that tool by default unless explicitly authorized for nested spawning."},{"id":"FR-007","text":"System MUST apply the isolation contract recursively, so that nested subagents receive only their own scoped payload and return their own typed result without inheriting parent context."},{"id":"FR-008","text":"System MUST permit replacement of any subagent's internal implementation without requiring changes to the coordinator, as long as the Handoff Contract is preserved."}],"successCriteria":[{"id":"SC-001","text":"Zero bytes of coordinator-private conversation history are observable in any subagent's input payload, measured by diffing declared Subtask Payload content against the coordinator's transcript across a representative task suite."},{"id":"SC-002","text":"100% of subagent outputs are either schema-valid under the declared Subagent Result schema or quarantined as terminal errors; the system never silently accepts a non-conforming result."},{"id":"SC-003","text":"Replacing a single subagent implementation with a different implementation that honors the same Handoff Contract requires zero changes to the coordinator's code, prompt, or configuration."},{"id":"SC-004","text":"The count of occurrences of an injected leak-probe string across all subagent input payloads for a representative task run equals zero."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (matches Kata 1 baseline in"},{"label":"Primary Dependencies","value":"- `anthropic` — each `Subagent.run()` opens its own"},{"label":"Storage","value":"Local filesystem only. Per-run artifacts written to"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit + lint."},{"label":"Target Platform","value":"Developer local machine (macOS/Linux) and GitHub Actions"},{"label":"Project Type","value":"Single project. Kata lives at"},{"label":"Performance Goals","value":"Not latency-bound. Recorded-fixture acceptance suite"},{"label":"Constraints","value":"- `katas/004_subagent_isolation/subagent.py` MUST NOT import, reference, or"},{"label":"Scale/Scope","value":"One kata, ~400–600 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/004-subagent-isolation","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"System MUST limit each subagent's input to fields declared in a versioned Subtask Payload schema; any field not in the schema MUST NOT be transmitted."},{"id":"FR-002","text":"System MUST reject any implicit inheritance of the coordinator's conversation history, scratchpads, or tool-call transcripts into a subagent's input context."},{"id":"FR-003","text":"System MUST validate every subagent's output against a declared Subagent Result schema before the coordinator consumes any part of it."},{"id":"FR-004","text":"System MUST treat schema validation failures (input or output) as terminal errors with no silent fallback; retries are permitted only under an explicitly declared policy."},{"id":"FR-005","text":"System MUST log the exact payload handed to each subagent and the exact result received, in a form that an auditor can diff against the declared schemas."},{"id":"FR-006","text":"System MUST configure the coordinator with a task-spawning tool in its allowed tools list; subagents MUST NOT share that tool by default unless explicitly authorized for nested spawning."},{"id":"FR-007","text":"System MUST apply the isolation contract recursively, so that nested subagents receive only their own scoped payload and return their own typed result without inheriting parent context."},{"id":"FR-008","text":"System MUST permit replacement of any subagent's internal implementation without requiring changes to the coordinator, as long as the Handoff Contract is preserved."},{"id":"SC-001","text":"Zero bytes of coordinator-private conversation history are observable in any subagent's input payload, measured by diffing declared Subtask Payload content against the coordinator's transcript across a representative task suite."},{"id":"SC-002","text":"100% of subagent outputs are either schema-valid under the declared Subagent Result schema or quarantined as terminal errors; the system never silently accepts a non-conforming result."},{"id":"SC-003","text":"Replacing a single subagent implementation with a different implementation that honors the same Handoff Contract requires zero changes to the coordinator's code, prompt, or configuration."},{"id":"SC-004","text":"The count of occurrences of an injected leak-probe string across all subagent input payloads for a representative task run equals zero."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","FR-008","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"003-posttool-normalize":{"board":{"todo":[{"id":"US1","title":"Practitioner sees a clean, minimal JSON instead of raw legacy output","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Practitioner compares baseline vs. normalized runs and observes the anti-pattern defense","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Practitioner adds a new status code mapping without touching the model","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Practitioner sees a clean, minimal JSON instead of raw legacy output","priority":"P1","scenarioCount":3,"body":"A practitioner invokes the legacy data tool from within an agent session. Before the tool's response reaches the model's context, a PostToolUse hook intercepts it, strips all legacy markup, resolves every arcane status code into a human-readable string, and attaches a compact JSON object to the conversation history. The model never observes the raw heterogeneous legacy payload.\n\n**Why this priority**: This is the core value of the kata and the primary defense against Principle II (Schema-Enforced Boundaries) and Principle III (Context Economy) violations. Without P1 the feature does not exist, and the model is left to parse noisy legacy data on every turn — the exact anti-pattern the kata targets.\n\n**Independent Test**: Can be fully tested by calling the legacy data tool with a representative legacy payload, capturing the message that lands in the model's conversation history, and verifying it is a schema-conformant JSON object with no legacy markup and fully resolved status text. Delivers immediate value even without the other stories.\n\n**Acceptance Scenarios**:\n\n1. **Given** the agent is wired to a legacy data source that returns heterogeneous markup blocks and arcane status codes, **When** the practitioner triggers a tool call and the PostToolUse hook runs, **Then** the message appended to the model's conversation history is a minimal JSON object with no legacy markup characters and every status code replaced by a human-readable string.\n2. **Given** the hook is active, **When** a tool response contains a recognized status code, **Then** the normalized JSON contains the mapped human-readable label rather than the raw code.\n3. **Given** the hook is active, **When** the practitioner inspects the conversation history after a tool call, **Then** no raw legacy block from the source is present in model context.","clarificationCount":0},{"id":"US2","title":"Practitioner compares baseline vs. normalized runs and observes the anti-pattern defense","priority":"P2","scenarioCount":3,"body":"A practitioner runs the same task twice — once with the PostToolUse hook disabled (baseline, raw legacy payload injected directly into history — the anti-pattern) and once with the hook enabled (normalized). They compare token usage of the tool-response messages and the rate of downstream misinterpretations by the model.\n\n**Why this priority**: Makes the anti-pattern (raw, noisy, legacy-formatted responses pushed into context so the model \"figures it out\" every turn) concrete and measurable. Directly enforces Principle III (Context Economy) and Principle VIII (Docs) by producing a comparison artifact, but the feature is usable for P1 alone.\n\n**Independent Test**: Can be fully tested by toggling the hook on/off across two otherwise-identical runs, recording the token count of the tool-response message and the count of downstream misinterpretation events, and verifying the normalized run is strictly smaller on both axes.\n\n**Acceptance Scenarios**:\n\n1. **Given** two identical agent runs over the same legacy payload, **When** the hook is disabled in the first and enabled in the second, **Then** the tool-response token count is substantially lower in the normalized run.\n2. **Given** the comparison output, **When** downstream model misinterpretations are counted (decisions based on misread legacy markup or unresolved codes), **Then** the normalized run records fewer such misinterpretations than the baseline.\n3. **Given** the practitioner reviews both runs, **When** they examine the baseline conversation history, **Then** the raw legacy block is visibly present — documenting the anti-pattern — and the normalized run contains only the clean JSON.","clarificationCount":0},{"id":"US3","title":"Practitioner adds a new status code mapping without touching the model","priority":"P3","scenarioCount":2,"body":"A practitioner discovers a new arcane status code emitted by the legacy source. They add a single entry to the normalization map and re-run the tool. The new code flows through the hook, is resolved to its human-readable string, and appears correctly in the minimal JSON — with no change to prompts, model configuration, or agent wiring.\n\n**Why this priority**: Validates that the normalization map is a genuine schema boundary (Principle II) and that extending coverage is a configuration change, not a model change. Nice-to-have for the kata but proves the design scales; the feature still delivers without it.\n\n**Independent Test**: Can be fully tested by adding one entry to the normalization map, triggering a tool response that emits the new code, and verifying the resolved string appears in the normalized JSON — with no edits to any prompt or model-facing artifact.\n\n**Acceptance Scenarios**:\n\n1. **Given** the normalization map is extended with a new status code → human-readable string pair, **When** the tool returns a payload containing that code, **Then** the normalized JSON contains the mapped string.\n2. **Given** the new mapping was added, **When** the practitioner diffs the change, **Then** only the normalization map is modified — no prompts, no model settings, no agent wiring.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST intercept every tool response from the legacy data source via a PostToolUse hook before that response reaches the model's context."},{"id":"FR-002","text":"The system MUST produce a schema-conformant minimal JSON object for every intercepted response, where \"schema-conformant\" means it adheres to a single documented shape with a bounded field set."},{"id":"FR-003","text":"The system MUST map all known arcane status codes to human-readable strings using an explicit normalization map, and MUST surface unknown codes as an explicit \"unknown\" marker with the raw code retained — never a guessed or fabricated label."},{"id":"FR-004","text":"The system MUST NOT pass raw legacy formats (markup blocks, arcane codes, heterogeneous payloads) downstream into the model's conversation history under any circumstance, including parse failures and empty responses."},{"id":"FR-005","text":"The system MUST log the original, unmodified tool payload to an audit record for every intercepted response, even when the normalized form is what is delivered to the model, so that 100% of originals remain retrievable for review."},{"id":"FR-006","text":"The system MUST attach the normalized JSON to the model's conversation history in place of the original tool response, preserving working memory by keeping the injected message minimal."},{"id":"FR-007","text":"The system MUST handle malformed, empty, unknown-code, nested, and oversized payloads without crashing and without leaking raw legacy content into model context."}],"successCriteria":[{"id":"SC-001","text":"The token count of the normalized payload is no more than 30% of the token count of the corresponding raw tool response, measured across a representative sample of legacy payloads."},{"id":"SC-002","text":"Zero raw legacy markup blocks reach model context across all runs with the hook enabled — verified by scanning every message appended to the conversation history."},{"id":"SC-003","text":"Unknown status codes surface in the normalized payload as an explicit \"unknown\" marker in 100% of cases, with no guessed or fabricated human-readable labels."},{"id":"SC-004","text":"The audit trail retains 100% of original tool responses, byte-for-byte recoverable, even when the normalized form delivered to the model is degraded, empty, or trimmed."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+ (shared baseline with Kata 1)."},{"label":"Primary Dependencies","value":"- `anthropic` — used for PostToolUse wiring semantics and for a token counter"},{"label":"Storage","value":"Local filesystem only. Audit log written as append-only JSONL at"},{"label":"Testing","value":"pytest + pytest-bdd for acceptance; plain pytest for unit tests."},{"label":"Target Platform","value":"Developer local (macOS/Linux) + GitHub Actions Linux."},{"label":"Project Type","value":"Single project — one kata package under"},{"label":"Performance Goals","value":"Normalize a fixture payload in <50 ms on dev hardware."},{"label":"Constraints","value":"- FR-004 is absolute: raw legacy markup characters MUST NOT appear in the"},{"label":"Scale/Scope","value":"One kata, ~350–500 LOC implementation + comparable test code;"}],"researchDecisions":[],"fileStructure":{"rootName":"specs/003-posttool-normalize","entries":[]},"diagram":null,"tesslTiles":[{"name":"tessl-labs/intent-integrity-kit","version":"2.10.0","eval":null,"reviewScore":92}],"exists":true},"checklist":{"files":[],"gate":{"status":"blocked","level":"red","label":"GATE: BLOCKED"}},"testify":{"requirements":[{"id":"FR-001","text":"The system MUST intercept every tool response from the legacy data source via a PostToolUse hook before that response reaches the model's context."},{"id":"FR-002","text":"The system MUST produce a schema-conformant minimal JSON object for every intercepted response, where \"schema-conformant\" means it adheres to a single documented shape with a bounded field set."},{"id":"FR-003","text":"The system MUST map all known arcane status codes to human-readable strings using an explicit normalization map, and MUST surface unknown codes as an explicit \"unknown\" marker with the raw code retained — never a guessed or fabricated label."},{"id":"FR-004","text":"The system MUST NOT pass raw legacy formats (markup blocks, arcane codes, heterogeneous payloads) downstream into the model's conversation history under any circumstance, including parse failures and empty responses."},{"id":"FR-005","text":"The system MUST log the original, unmodified tool payload to an audit record for every intercepted response, even when the normalized form is what is delivered to the model, so that 100% of originals remain retrievable for review."},{"id":"FR-006","text":"The system MUST attach the normalized JSON to the model's conversation history in place of the original tool response, preserving working memory by keeping the injected message minimal."},{"id":"FR-007","text":"The system MUST handle malformed, empty, unknown-code, nested, and oversized payloads without crashing and without leaking raw legacy content into model context."},{"id":"SC-001","text":"The token count of the normalized payload is no more than 30% of the token count of the corresponding raw tool response, measured across a representative sample of legacy payloads."},{"id":"SC-002","text":"Zero raw legacy markup blocks reach model context across all runs with the hook enabled — verified by scanning every message appended to the conversation history."},{"id":"SC-003","text":"Unknown status codes surface in the normalized payload as an explicit \"unknown\" marker in 100% of cases, with no guessed or fabricated human-readable labels."},{"id":"SC-004","text":"The audit trail retains 100% of original tool responses, byte-for-byte recoverable, even when the normalized form delivered to the model is degraded, empty, or trimmed."}],"testSpecs":[],"tasks":[],"edges":[],"gaps":{"untestedRequirements":["FR-001","FR-002","FR-003","FR-004","FR-005","FR-006","FR-007","SC-001","SC-002","SC-003","SC-004"],"unimplementedTests":[]},"pyramid":{"acceptance":{"count":0,"ids":[]},"contract":{"count":0,"ids":[]},"validation":{"count":0,"ids":[]}},"integrity":{"status":"missing","currentHash":null,"storedHash":null},"exists":false},"analyze":{"healthScore":null,"heatmap":{"columns":[],"rows":[]},"issues":[],"metrics":null,"constitutionAlignment":[],"exists":false},"bugs":{"exists":false,"bugs":[],"orphanedTasks":[],"summary":{"total":0,"open":0,"fixed":0,"highestOpenSeverity":null,"bySeverity":{"critical":0,"high":0,"medium":0,"low":0}},"repoUrl":null}},"002-pretool-guardrails":{"board":{"todo":[{"id":"US1","title":"Refund Within Policy Proceeds Untouched","priority":"P1","tasks":[],"progress":"0/0","column":"todo"},{"id":"US2","title":"Over-Limit Refund Is Blocked Pre-API by Deterministic Logic","priority":"P2","tasks":[],"progress":"0/0","column":"todo"},{"id":"US3","title":"Policy Change Takes Effect Without Retraining or Prompt Tuning","priority":"P3","tasks":[],"progress":"0/0","column":"todo"}],"in_progress":[],"done":[],"integrity":{"status":"missing","currentHash":null,"storedHash":null}},"pipeline":{"phases":[{"id":"constitution","name":"Premise &\nConstitution","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"spec","name":"Spec","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"plan","name":"Plan","status":"complete","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"checklist","name":"Checklist","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"testify","name":"Testify","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"tasks","name":"Tasks","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"analyze","name":"Analyze","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]},{"id":"implement","name":"Implement","status":"not_started","progress":null,"optional":false,"clarifications":0,"clarificationEntries":[]}]},"storyMap":{"stories":[{"id":"US1","title":"Refund Within Policy Proceeds Untouched","priority":"P1","scenarioCount":2,"body":"A practitioner asks the agent to process a refund for a customer, and the requested amount falls within the organization's policy limit. The PreToolUse hook inspects the payload, the schema validates, the amount passes the policy threshold, and the tool invocation reaches the external refund API unmodified. The agent reports success to the practitioner.\n\n**Why this priority**: Without a happy path, the guardrail has no baseline of correct behavior. P1 proves the hook does not over-block and that legitimate business flows continue working — a guardrail that rejects everything is indistinguishable from a broken system.\n\n**Independent Test**: A refund request with an amount strictly below the policy limit is submitted. The system is observed to produce exactly one external refund API call with the original payload, and the agent surfaces a success outcome to the practitioner.\n\n**Acceptance Scenarios**:\n\n1. **Given** a configured refund policy with a positive limit, **When** the agent invokes the refund tool with an amount strictly below the limit and a schema-valid payload, **Then** the PreToolUse hook emits an allow verdict and the external API receives exactly one call with the original payload.\n2. **Given** a schema-valid in-policy refund request, **When** the external API responds successfully, **Then** the agent conveys a success outcome derived from the real API response, not from a hook-synthesized stub.","clarificationCount":0},{"id":"US2","title":"Over-Limit Refund Is Blocked Pre-API by Deterministic Logic","priority":"P2","scenarioCount":4,"body":"A practitioner asks the agent to process a refund that exceeds the configured policy limit. Before the payload can reach the external refund API, a PreToolUse hook inspects the amount field, compares it to the policy, produces a deterministic reject verdict, and emits a structured error back into the model's context. No external API call is made. The model observes the structured error and is forced to react — typically by routing the request to an escalation flow — rather than self-policing via prose. Enforcement is guaranteed by deterministic code at the tool boundary, not by a system-prompt instruction asking the model to behave.\n\n**Why this priority**: This is the core value of the feature and the defense against the named anti-pattern (prompt-only enforcement). Without P2, the \"guardrail\" is aspirational; with P2, the policy is physically unbypassable even if the model is confused, jailbroken, or fine-tuned differently later.\n\n**Independent Test**: A refund request with an amount strictly above the policy limit is submitted. The system is observed to produce zero external API calls, a structured error object in the model's next context window, and an escalation event in the audit log — all without any change to the system prompt.\n\n**Acceptance Scenarios**:\n\n1. **Given** a configured refund policy with a limit L, **When** the agent invokes the refund tool with an amount strictly greater than L, **Then** the PreToolUse hook emits a reject verdict before any external API call is made and zero refund API requests are observed for that invocation.\n2. **Given** a rejected over-limit invocation, **When** control returns to the model, **Then** the model's context receives a structured error payload identifying the policy that was breached, the offending field, and the escalation pathway.\n3. **Given** the same over-limit request is retried verbatim, **When** the hook evaluates it, **Then** it is rejected again with an identical verdict — the outcome is deterministic across runs.\n4. **Given** a system prompt that does not mention any dollar limit at all, **When** an over-limit refund is attempted, **Then** the request is still blocked — proving enforcement is not prompt-based.","clarificationCount":0},{"id":"US3","title":"Policy Change Takes Effect Without Retraining or Prompt Tuning","priority":"P3","scenarioCount":3,"body":"A practitioner (or policy owner) updates the refund limit — for example, from $500 to $250 — in the policy configuration. The next refund invocation is evaluated against the new limit immediately. No model retraining, no fine-tuning, no edit to the system prompt, and no agent redeployment are required. An amount that was previously allowed may now be rejected, and vice versa, purely as a function of the updated policy data.\n\n**Why this priority**: Proves the guardrail is truly data-driven and externalized from the model. Compliance, finance, and risk teams can tighten or loosen limits on their own cadence without an AI release cycle — a key operational property separating deterministic guardrails from prompt-based heuristics.\n\n**Independent Test**: With policy limit L1, submit an amount A where L2 < A < L1 and observe approval. Update the policy limit from L1 to L2 (L2 < L1). Without changing the system prompt or redeploying the model, submit the same amount A again and observe rejection. Verify the audit log cites the new limit L2.\n\n**Acceptance Scenarios**:\n\n1. **Given** a policy limit L1 and an amount A with A < L1, **When** the refund tool is invoked, **Then** the hook allows the invocation.\n2. **Given** the policy limit is updated from L1 to L2 where L2 < A < L1, **When** the same refund with amount A is next invoked, **Then** the hook rejects it and cites the updated limit L2 in the structured error and audit log.\n3. **Given** a policy change, **When** it takes effect, **Then** no modification to the system prompt, tool schema, or model version is required for the new limit to be enforced.","clarificationCount":0}],"requirements":[{"id":"FR-001","text":"The system MUST intercept every refund tool invocation at a PreToolUse boundary that executes strictly before any call to the external refund API."},{"id":"FR-002","text":"The system MUST validate the tool invocation payload against a declared, versioned schema covering at minimum the presence, type, sign, and numeric bounds of the amount field."},{"id":"FR-003","text":"The system MUST reject any invocation that fails schema validation with a structured error that identifies the offending field and the validation rule breached."},{"id":"FR-004","text":"The system MUST reject any invocation whose amount exceeds the currently configured policy limit, regardless of anything stated in the system prompt."},{"id":"FR-005","text":"The system MUST surface every rejection back into the model's context as a structured error object (not a silent skip, not a free-text apology) so the model observes and can react to the constraint."},{"id":"FR-006","text":"The system MUST produce zero calls to the external refund API for any invocation that the hook rejects."},{"id":"FR-007","text":"On a policy-breach rejection, the system MUST emit an escalation event that a human reviewer can act on, consistent with the Human-in-the-Loop principle."},{"id":"FR-008","text":"The system MUST NOT rely on system-prompt instructions (e.g., \"don't refund more than $500\") as the mechanism of enforcement; prompt text MAY describe the policy for the model's benefit, but MUST NOT be the control."},{"id":"FR-009","text":"The system MUST log every rejection with: a timestamp, the policy identifier and version, the offending field and value, the verdict, and a correlation identifier linking the log entry to the model turn and the escalation event."},{"id":"FR-010","text":"The system MUST produce identical verdicts for identical (payload, policy snapshot) pairs — the hook MUST be deterministic."},{"id":"FR-011","text":"The system MUST allow the policy limit to be changed via configuration data, with the change taking effect on the next invocation and without requiring any modification to the model, its prompts, or its tool schema."},{"id":"FR-012","text":"The system MUST fail closed when the hook itself cannot complete evaluation (e.g., policy unreadable, internal exception), treating an indeterminate verdict as a reject with a distinct structured error code."},{"id":"FR-013","text":"The system MUST document the hook behavior, policy schema, and escalation flow, consistent with the Docs principle."}],"successCriteria":[{"id":"SC-001","text":"100% of refund invocations whose amount exceeds the configured policy limit are blocked at the PreToolUse hook before reaching the external API, measured over the full acceptance test suite."},{"id":"SC-002","text":"0 external refund API calls are observed (via network/audit instrumentation) for any invocation the hook rejected, measured across all rejected invocations in the acceptance test suite."},{"id":"SC-003","text":"100% of rejections deliver a structured error object into the model's subsequent context window — there are no silent skips, no empty responses, and no free-text-only rejections — measured by inspecting the post-rejection context for every rejected invocation."},{"id":"SC-004","text":"A policy-limit change takes effect within one invocation of the change being persisted, with no model retraining, no prompt edit, and no redeployment required, verified by a before/after test using the same payload against the old and new limits."}],"clarifications":[],"edges":[{"from":"US3","to":"FR-001"},{"from":"US3","to":"FR-002"},{"from":"US3","to":"FR-003"},{"from":"US3","to":"FR-004"},{"from":"US3","to":"FR-005"},{"from":"US3","to":"FR-006"},{"from":"US3","to":"FR-007"},{"from":"US3","to":"FR-008"},{"from":"US3","to":"FR-009"},{"from":"US3","to":"FR-010"},{"from":"US3","to":"FR-011"},{"from":"US3","to":"FR-012"},{"from":"US3","to":"FR-013"}]},"planView":{"techContext":[{"label":"Language/Version","value":"Python 3.11+"},{"label":"Primary Dependencies","value":"- `anthropic` (official Claude SDK) — tool dispatch pipeline whose PreToolUse"},{"label":"Storage","value":"Local filesystem only."},{"label":"Testing","v
